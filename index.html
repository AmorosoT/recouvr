function Badge({s,devis=false}){
  const map=devis?STATUTS_DEVIS:STATUTS;
  const st=map[s]||map[devis?'en_attente':'attente'];
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:'100px',fontSize:'12px',fontWeight:600,color:st.color,background:st.bg}}>{st.label}</span>;
}

function StatCard({label,value,sub,color}){return(
  <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'1.25rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
    <div style={{fontSize:'12px',color:C.textSecondary,marginBottom:'6px',textTransform:'uppercase',letterSpacing:'.5px',fontWeight:500}}>{label}</div>
    <div style={{fontSize:'1.8rem',fontWeight:800,color:color||C.textPrimary,letterSpacing:'-1px',lineHeight:1}}>{value}</div>
    {sub&&<div style={{fontSize:'12px',color:C.textMuted,marginTop:'6px'}}>{sub}</div>}
  </div>
);}

function Btn({onClick,children,variant='primary',full,disabled,loading,style:s={}}){
  const base={padding:'9px 18px',borderRadius:'8px',fontSize:'13px',fontWeight:600,cursor:disabled||loading?'not-allowed':'pointer',width:full?'100%':'auto',opacity:disabled||loading?0.55:1,transition:'all .15s',border:'none',...s};
  const v={
    primary:{background:C.blue,color:'#fff'},
    outline:{background:'transparent',color:C.textPrimary,border:`1px solid ${C.borderDark}`},
    danger:{background:C.redBg,color:C.red,border:`1px solid ${C.red}33`},
    success:{background:C.greenBg,color:C.green,border:`1px solid ${C.green}33`},
    ghost:{background:'transparent',color:C.textSecondary},
    sidebarBtn:{background:'transparent',color:'#f87171',border:'1px solid rgba(248,113,113,0.3)'},
  };
  return <button onClick={disabled||loading?undefined:onClick} style={{...base,...(v[variant]||v.primary)}}>{loading?'⏳...' : children}</button>;
}

function Input({label,error,...p}){return(
  <div style={{marginBottom:'1rem'}}>

function Toast({msg,type='success',onDone}){
  useEffect(()=>{const t=setTimeout(onDone,4000);return()=>clearTimeout(t);},[]);
  const c={success:{bg:C.greenBg,bd:`${C.green}44`,color:C.green},error:{bg:C.redBg,bd:`${C.red}44`,color:C.red},info:{bg:C.blueLight,bd:`${C.blue}44`,color:C.blue}};
  const st=c[type]||c.success;
  return <div style={{position:'fixed',bottom:'2rem',right:'2rem',background:st.bg,border:`1px solid ${st.bd}`,borderRadius:'12px',padding:'12px 20px',color:st.color,fontSize:'14px',fontWeight:600,zIndex:2000,maxWidth:'380px',boxShadow:'0 4px 16px rgba(0,0,0,0.1)'}}>{msg}</div>;
}

function exportRapportPDF(factures,clients,companyName){

/* ── IMPORT MODAL ────────────────────────────────────────── */
function ImportModal({type,user,clients,setClients,setFactures,toast,onClose}){
  const [tab,setTab]=useState('excel');
  const [sheetsUrl,setSheetsUrl]=useState('');
  const [preview,setPreview]=useState(null);
  const [loading,setLoading]=useState(false);
  const [importing,setImporting]=useState(false);
  const fileRef=useRef();
  const isClient=type==='clients';
  const norm=k=>k.toLowerCase().replace(/[éèêë]/g,'e').replace(/[àâä]/g,'a').replace(/[^a-z0-9]/g,'');
  const get=(row,aliases)=>{const keys=Object.keys(row);for(const a of aliases){const k=keys.find(k2=>norm(k2)===a||norm(k2).includes(a));if(k&&row[k]!==null&&String(row[k]).trim())return String(row[k]).trim();}return '';};
  const parseRows=rows=>{
    if(isClient)return rows.map(r=>({nom:get(r,['nom','name','societe','raison','client','company']),email:get(r,['email','mail','courriel']),tel:get(r,['tel','telephone','phone','portable'])})).filter(r=>r.nom&&r.email&&r.email.includes('@'));
    return rows.map(r=>{
      const nomClient=get(r,['client','societe','nom','company']);
      const client=nomClient?clients.find(c=>c.nom.toLowerCase().includes(nomClient.toLowerCase().slice(0,4))):null;
      const montant=parseFloat((get(r,['montant','amount','total','prix'])||'0').replace(/[^0-9.,]/g,'').replace(',','.'))||0;
      if(!montant)return null;
      return{num:get(r,['numero','facture','ref','invoice'])||`IMP-${uid()}`,client_id:client?.id||'',montant,emission:get(r,['emission','date','issued'])||now.toISOString().slice(0,10),echeance:get(r,['echeance','due','deadline'])||'',statut:'attente',user_id:user.id};
    }).filter(Boolean);
  };
  const handleFile=async e=>{
    const file=e.target.files[0];if(!file)return;setLoading(true);
    try{
      if(file.name.match(/\.(xlsx|xls)$/i)){const buf=await file.arrayBuffer();const wb=XLSX.read(buf);setPreview(parseRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''})));}
      else{const parsed=Papa.parse(await file.text(),{header:true,skipEmptyLines:true,delimiter:(await file.text()).includes(';')?';':',',dynamicTyping:false});setPreview(parseRows(parsed.data));}
    }catch(e){toast('✕ Erreur de lecture','error');}
    setLoading(false);
  };
  const handleSheets=async()=>{
    if(!sheetsUrl)return;setLoading(true);
    try{
      let url=sheetsUrl;
      if(!url.includes('output=csv')){const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);if(m)url=`https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv`;else throw new Error('URL invalide');}
      const res=await fetch(url);if(!res.ok)throw new Error('Fichier inaccessible');
      setPreview(parseRows(Papa.parse(await res.text(),{header:true,skipEmptyLines:true,dynamicTyping:false}).data));
    }catch(e){toast('✕ '+e.message,'error');}
    setLoading(false);
  };
  const confirmImport=async()=>{
    if(!preview?.length)return;setImporting(true);
    try{
      if(isClient){
        const existing=new Set(clients.map(c=>c.email));
        const news=preview.filter(c=>!existing.has(c.email)).map(c=>({...c,user_id:user.id}));
        if(news.length){const{data,error}=await sb.from('clients').insert(news).select();if(error)throw error;setClients(p=>[...p,...data]);toast(`✓ ${data.length} client(s) importé(s)`);}
        else toast('ℹ Tous les contacts existent déjà','info');
      }else{
        const{data,error}=await sb.from('factures').insert(preview).select();
        if(error)throw error;setFactures(p=>[...data,...p]);toast(`✓ ${data.length} facture(s) importée(s)`);
      }
      onClose();
    }catch(e){toast('✕ '+e.message,'error');}
    setImporting(false);
  };
  const cols=isClient?['Nom','Email','Téléphone']:['N° Facture','Client','Montant','Échéance'];
  return(
    <Modal title={`Importer des ${isClient?'clients':'factures'}`} onClose={onClose} width={580}>
      <div style={{display:'flex',gap:'4px',background:C.pageBg,borderRadius:'8px',padding:'4px',marginBottom:'1.5rem'}}>
        {[['excel','📊 Excel / CSV'],['sheets','🔗 Google Sheets']].map(([k,l])=>(
          <button key={k} onClick={()=>{setTab(k);setPreview(null);}} style={{flex:1,padding:'9px',borderRadius:'6px',border:'none',fontSize:'13px',fontWeight:600,cursor:'pointer',background:tab===k?C.blue:'transparent',color:tab===k?'#fff':C.textSecondary}}>{l}</button>
        ))}
      </div>
      {tab==='excel'?(
        <div>
          <div style={{border:`2px dashed ${C.border}`,borderRadius:'10px',padding:'2rem',textAlign:'center',marginBottom:'1rem',cursor:'pointer',background:C.pageBg}} onClick={()=>fileRef.current.click()}>
            <div style={{fontSize:'2rem',marginBottom:'8px'}}>📂</div>
            <div style={{color:C.textPrimary,fontWeight:600,marginBottom:'4px'}}>Cliquez pour sélectionner</div>
            <div style={{color:C.textMuted,fontSize:'13px'}}>.xlsx, .xls, .csv</div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:'none'}}/>
          </div>
          <div style={{background:C.pageBg,borderRadius:'8px',padding:'10px',fontSize:'12px',color:C.textSecondary}}>
            Colonnes : {isClient?'nom, email, tel':'numero, client, montant, emission, echeance'}
          </div>
        </div>
      ):(
        <div>
          <p style={{color:C.textSecondary,fontSize:'13px',marginBottom:'12px',lineHeight:1.6}}>Fichier → Partager → Publier sur le web → CSV → copier l'URL</p>
          <div style={{display:'flex',gap:'8px',marginBottom:'1rem'}}>
            <input value={sheetsUrl} onChange={e=>setSheetsUrl(e.target.value)} placeholder="https://docs.google.com/spreadsheets/d/..." style={{flex:1,padding:'9px 12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'13px',outline:'none'}}/>
            <Btn onClick={handleSheets} loading={loading}>Analyser</Btn>
          </div>
        </div>
      )}
      {loading&&<div style={{textAlign:'center',padding:'1rem',color:C.textSecondary}}>⏳ Analyse...</div>}
      {preview&&preview.length>0&&(
        <div style={{marginTop:'1rem'}}>
          <div style={{color:C.green,fontWeight:700,fontSize:'14px',marginBottom:'8px'}}>✓ {preview.length} {isClient?'contact(s)':'facture(s)'} détecté(s)</div>
          <div style={{border:`1px solid ${C.border}`,borderRadius:'8px',overflow:'hidden',maxHeight:'180px',overflowY:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead><tr style={{background:'#F8FAFC'}}>{cols.map(h=><th key={h} style={{padding:'7px 12px',textAlign:'left',color:C.textSecondary,fontWeight:600,fontSize:'11px',textTransform:'uppercase'}}>{h}</th>)}</tr></thead>
              <tbody>
                {preview.slice(0,8).map((r,i)=>(
                  <tr key={i} style={{borderTop:`1px solid ${C.border}`,background:i%2===0?'#fff':'#FAFBFD'}}>
                    {isClient?(<><td style={{padding:'6px 12px',fontWeight:500}}>{r.nom}</td><td style={{padding:'6px 12px',color:C.blue}}>{r.email}</td><td style={{padding:'6px 12px',color:C.textSecondary}}>{r.tel||'—'}</td></>):(<><td style={{padding:'6px 12px',fontFamily:'monospace',fontSize:'12px'}}>{r.num}</td><td style={{padding:'6px 12px',color:r.client_id?C.textPrimary:C.amber}}>{r.client_id?clients.find(c=>c.id===r.client_id)?.nom:'Non trouvé'}</td><td style={{padding:'6px 12px',fontWeight:700}}>{r.montant?fmtEur(r.montant):'—'}</td><td style={{padding:'6px 12px',color:C.textSecondary}}>{fmtDate(r.echeance)}</td></>)}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {preview&&preview.length===0&&<div style={{background:C.redBg,border:`1px solid ${C.red}33`,borderRadius:'8px',padding:'12px',color:C.red,fontSize:'13px',marginTop:'1rem'}}>⚠ Aucune donnée valide</div>}
      <div style={{display:'flex',justifyContent:'flex-end',gap:'8px',marginTop:'1.5rem'}}>
        <Btn onClick={onClose} variant="outline">Annuler</Btn>
        {preview?.length>0&&<Btn onClick={confirmImport} loading={importing}>⬆ Importer {preview.length}</Btn>}
      </div>
    </Modal>
  );
}

/* ── AUTH ────────────────────────────────────────────────── */
function AuthPage({onAuth}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');const [pwd,setPwd]=useState('');
  const [company,setCompany]=useState('');const [code,setCode]=useState('');
  const [loading,setLoading]=useState(false);const [error,setError]=useState('');const [success,setSuccess]=useState('');
  const INVITE_CODE='FERPLY2024';
  const handleLogin=async()=>{
    if(!email||!pwd){setError('Email et mot de passe requis');return;}
    setLoading(true);setError('');
    const{error:e}=await sb.auth.signInWithPassword({email,password:pwd});
    if(e){setError('Email ou mot de passe incorrect');setLoading(false);return;}
    onAuth();
  };
  const handleSignup=async()=>{
    if(!email||!pwd||!company){setError('Tous les champs sont requis');return;}
    if(code!==INVITE_CODE){setError('Code d\'invitation invalide.');return;}
    if(pwd.length<8){setError('Minimum 8 caractères');return;}
    setLoading(true);setError('');
    const{data,error:e}=await sb.auth.signUp({email,password:pwd,options:{data:{company_name:company}}});
    if(e){setError(e.message);setLoading(false);return;}
    if(data.user)await sb.from('profiles').insert({id:data.user.id,email,company_name:company,invited:true});
    setSuccess('Compte créé ! Vérifiez votre email.');setLoading(false);
  };
  return(
    <div style={{minHeight:'100vh',background:`linear-gradient(135deg,${C.blueDark} 0%,#2d5a9e 100%)`,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
      <div style={{width:'100%',maxWidth:'420px'}}>
        <div style={{textAlign:'center',marginBottom:'2.5rem'}}><Logo size={38} light={true}/><p style={{color:'#94a3b8',fontSize:'15px',marginTop:'12px'}}>La trésorerie, enfin sous contrôle.</p></div>
        <div style={{background:C.cardBg,borderRadius:'16px',padding:'2rem',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
          <div style={{display:'flex',gap:'4px',background:C.pageBg,borderRadius:'8px',padding:'4px',marginBottom:'1.5rem'}}>
            {[['login','Connexion'],['signup','Créer un compte']].map(([m,l])=>(
              <button key={m} onClick={()=>{setMode(m);setError('');setSuccess('');}} style={{flex:1,padding:'9px',borderRadius:'6px',border:'none',fontSize:'13px',fontWeight:600,cursor:'pointer',background:mode===m?C.blue:'transparent',color:mode===m?'#fff':C.textSecondary}}>{l}</button>
            ))}
          </div>
          {error&&<div style={{background:C.redBg,border:`1px solid ${C.red}33`,borderRadius:'8px',padding:'10px',color:C.red,fontSize:'13px',marginBottom:'1rem',fontWeight:500}}>{error}</div>}
          {success&&<div style={{background:C.greenBg,border:`1px solid ${C.green}33`,borderRadius:'8px',padding:'10px',color:C.green,fontSize:'13px',marginBottom:'1rem',fontWeight:500}}>{success}</div>}
          {mode==='login'?(<>
            <Input label="Email" type="email" placeholder="vous@entreprise.fr" value={email} onChange={e=>setEmail(e.target.value)}/>
            <Input label="Mot de passe" type="password" placeholder="••••••••" value={pwd} onChange={e=>setPwd(e.target.value)}/>
            <Btn onClick={handleLogin} loading={loading} full style={{padding:'12px',marginTop:'8px'}}>Se connecter →</Btn>
            <p style={{fontSize:'12px',color:C.textMuted,textAlign:'center',marginTop:'1rem'}}>Pas de compte ? <span onClick={()=>setMode('signup')} style={{color:C.blue,cursor:'pointer',fontWeight:600}}>Demandez un accès</span></p>
          </>):(<>
            <Input label="Raison sociale *" placeholder="Mon Entreprise SAS" value={company} onChange={e=>setCompany(e.target.value)}/>
            <Input label="Email *" type="email" placeholder="vous@entreprise.fr" value={email} onChange={e=>setEmail(e.target.value)}/>
            <Input label="Mot de passe *" type="password" placeholder="8 caractères minimum" value={pwd} onChange={e=>setPwd(e.target.value)}/>
            <div style={{marginBottom:'1rem'}}>
              <label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Code d'invitation *</label>
              <input type="text" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="Votre code" style={{width:'100%',padding:'9px 12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.blue,fontSize:'14px',outline:'none',fontFamily:'monospace',letterSpacing:'2px',fontWeight:700,boxSizing:'border-box'}}/>
            </div>
            <Btn onClick={handleSignup} loading={loading} full style={{padding:'12px'}}>Créer mon compte →</Btn>
          </>)}
        </div>
        <p style={{textAlign:'center',fontSize:'12px',color:'#64748b',marginTop:'1.5rem'}}>🔒 Données hébergées en Europe · RGPD · SSL</p>
      </div>
    </div>
  );
}

/* ── GRAPHIQUES ──────────────────────────────────────────── */
function Graphiques({factures,clients}){
  const r1=useRef();const r2=useRef();const r3=useRef();
  const c1=useRef(null);const c2=useRef(null);const c3=useRef(null);
  useEffect(()=>{
    if(!factures.length)return;
    const mois=[];
    for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);mois.push({label:d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}),key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`});}
    if(c1.current)c1.current.destroy();
    if(r1.current)c1.current=new Chart(r1.current,{type:'bar',data:{labels:mois.map(m=>m.label),datasets:[{label:'Encaissé',data:mois.map(m=>factures.filter(f=>f.statut==='payee'&&f.echeance?.startsWith(m.key)).reduce((s,f)=>s+f.montant,0)),backgroundColor:'rgba(21,128,61,0.8)',borderRadius:6},{label:'En retard',data:mois.map(m=>factures.filter(f=>f.statut==='retard'&&f.echeance?.startsWith(m.key)).reduce((s,f)=>s+f.montant,0)),backgroundColor:'rgba(220,38,38,0.7)',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmtEur(ctx.raw)}`}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>fmtEur(v)},grid:{color:'rgba(0,0,0,0.05)'}}}}});
    const counts={attente:0,retard:0,relancee:0,payee:0};
    factures.forEach(f=>counts[f.statut]=(counts[f.statut]||0)+f.montant);
    if(c2.current)c2.current.destroy();
    if(r2.current)c2.current=new Chart(r2.current,{type:'doughnut',data:{labels:['En attente','En retard','Relancées','Payées'],datasets:[{data:[counts.attente,counts.retard,counts.relancee,counts.payee],backgroundColor:['#fef3c7','#fee2e2','#dbeafe','#dcfce7'],borderColor:['#b45309','#dc2626','#1D4ED8','#15803d'],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmtEur(ctx.raw)}`}}}}});
    const clientStats=clients.map(c=>({nom:c.nom.split(' ')[0],total:factures.filter(f=>f.client_id===c.id&&f.statut!=='payee').reduce((s,f)=>s+f.montant,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total).slice(0,5);
    if(c3.current)c3.current.destroy();
    if(r3.current&&clientStats.length)c3.current=new Chart(r3.current,{type:'bar',data:{labels:clientStats.map(c=>c.nom),datasets:[{label:'Montant dû',data:clientStats.map(c=>c.total),backgroundColor:'rgba(29,78,216,0.8)',borderRadius:8}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtEur(ctx.raw)}}},scales:{x:{ticks:{callback:v=>fmtEur(v)},grid:{color:'rgba(0,0,0,0.05)'}},y:{grid:{display:false}}}}});
    return()=>{if(c1.current)c1.current.destroy();if(c2.current)c2.current.destroy();if(c3.current)c3.current.destroy();};
  },[factures,clients]);
  if(!factures.length)return(<div style={{textAlign:'center',padding:'3rem',background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',color:C.textMuted}}><div style={{fontSize:'2rem',marginBottom:'1rem'}}>📊</div><div style={{fontWeight:600,color:C.textPrimary}}>Ajoutez des factures pour voir les graphiques</div></div>);
  return(
    <div>
      <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'1.5rem',marginBottom:'1.5rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
        <h3 style={{color:C.textPrimary,fontWeight:700,fontSize:'15px',margin:'0 0 1rem'}}>📈 Trésorerie mensuelle — 6 derniers mois</h3>
        <div style={{height:'220px'}}><canvas ref={r1}/></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.5rem'}}>
        <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'1.5rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
          <h3 style={{color:C.textPrimary,fontWeight:700,fontSize:'15px',margin:'0 0 1rem'}}>🥧 Répartition par statut</h3>
          <div style={{height:'200px'}}><canvas ref={r2}/></div>
        </div>
        <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'1.5rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
          <h3 style={{color:C.textPrimary,fontWeight:700,fontSize:'15px',margin:'0 0 1rem'}}>🏆 Top clients — montants dus</h3>
          <div style={{height:'200px'}}><canvas ref={r3}/></div>
        </div>
      </div>
    </div>
  );
}

        <div style={{padding:'1rem 1.25rem',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{color:C.textPrimary,fontWeight:700,fontSize:'15px',margin:0}}>Factures récentes</h3>
          <Btn onClick={()=>setView('factures')} variant="ghost" style={{fontSize:'13px',color:C.blue}}>Voir tout →</Btn>

        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'14px'}}>
            <thead><tr style={{background:'#F8FAFC',borderBottom:`1px solid ${C.border}`}}>{['Numéro','Client','Montant','Échéance','Statut'].map(h=><th key={h} style={{padding:'10px 16px',textAlign:'left',color:C.textSecondary,fontWeight:600,fontSize:'12px',textTransform:'uppercase',letterSpacing:'.5px'}}>{h}</th>)}</tr></thead>
            <tbody>
              {!recentes.length&&<tr><td colSpan={5} style={{padding:'3rem',textAlign:'center',color:C.textMuted}}>Aucune facture pour l'instant</td></tr>}
              {recentes.map((f,i)=>(
                <tr key={f.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?C.cardBg:'#FAFBFD'}}>
                  <td style={{padding:'12px 16px',color:C.textSecondary,fontFamily:'monospace',fontSize:'12px'}}>{f.num}</td>
                  <td style={{padding:'12px 16px',color:C.textPrimary,fontWeight:500}}>{getC(f.client_id)?.nom||'—'}</td>
                  <td style={{padding:'12px 16px',color:C.textPrimary,fontWeight:700}}>{fmtEur(f.montant)}</td>
                  <td style={{padding:'12px 16px',color:f.statut==='retard'?C.red:C.textSecondary,fontSize:'13px'}}>{fmtDate(f.echeance)}</td>
                  <td style={{padding:'12px 16px'}}><Badge s={f.statut}/></td>

              ))}

          </table>
        </div>
      </div>
      <h3 style={{color:C.textPrimary,fontWeight:700,fontSize:'16px',margin:'0 0 1rem'}}>Analyse & graphiques</h3>
      <Graphiques factures={factures} clients={clients}/>
    </div>
  );
}

/* ── DEVIS ───────────────────────────────────────────────── */

  const [form,setForm]=useState({client_id:'',objet:'',validite:30,lignes:[{desc:'',qte:1,pu:0}],notes:''});

  const totalLignes=l=>l.reduce((s,x)=>s+(parseFloat(x.qte)||0)*(parseFloat(x.pu)||0),0);

  useEffect(()=>{
    sb.from('devis').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).then(({data})=>{if(data)setDevis(data);});
  },[]);

  const addLigne=()=>setForm({...form,lignes:[...form.lignes,{desc:'',qte:1,pu:0}]});
  const updateLigne=(i,f,v)=>{const l=[...form.lignes];l[i]={...l[i],[f]:v};setForm(p=>({...p,lignes:l}));};
  const removeLigne=i=>setForm(p=>({...p,lignes:p.lignes.filter((_,idx)=>idx!==i)}));

  const saveDevis=async()=>{
    if(!form.client_id){toast('Sélectionnez un client','error');return;}
    if(!form.objet){toast('Entrez un objet','error');return;}
    setSaving(true);
    const num=`DEV-${new Date().getFullYear()}-${String(devis.length+1).padStart(3,'0')}`;
    const{data,error}=await sb.from('devis').insert({user_id:user.id,num,client_id:form.client_id,objet:form.objet,validite:form.validite,lignes:form.lignes,notes:form.notes,total:totalLignes(form.lignes),statut:'en_attente',created_at:new Date().toISOString()}).select().single();
    if(error){toast('✕ Erreur','error');}else{setDevis(p=>[data,...p]);toast('✓ Devis créé');setShowCreate(false);setForm({client_id:'',objet:'',validite:30,lignes:[{desc:'',qte:1,pu:0}],notes:''});}
    setSaving(false);
  };

  const updateStatut=async(id,statut)=>{
    await sb.from('devis').update({statut}).eq('id',id);
    setDevis(p=>p.map(d=>d.id===id?{...d,statut}:d));
    toast(statut==='accepte'?'✓ Devis accepté':'Devis refusé');
  };

  const deleteDevis=async id=>{
    if(!window.confirm('Supprimer ?'))return;
    await sb.from('devis').delete().eq('id',id);setDevis(p=>p.filter(d=>d.id!==id));
  };

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <div><h2 style={{color:C.textPrimary,fontSize:'1.5rem',fontWeight:800,margin:0}}>Devis</h2><p style={{color:C.textSecondary,fontSize:'14px',marginTop:'4px'}}>{devis.length} devis au total</p></div>
        <Btn onClick={()=>setShowCreate(true)}>+ Nouveau devis</Btn>
      </div>
      {!devis.length&&(
        <div style={{textAlign:'center',padding:'4rem',background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px'}}>
          <div style={{fontSize:'2rem',marginBottom:'1rem'}}>📋</div>
          <div style={{color:C.textPrimary,fontWeight:700,marginBottom:'8px'}}>Aucun devis pour l'instant</div>
          <Btn onClick={()=>setShowCreate(true)}>+ Créer un devis</Btn>
        </div>
      )}
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
        {devis.map(d=>{
          const c=getC(d.client_id);const st=STATUTS_DEVIS[d.statut]||STATUTS_DEVIS.en_attente;
          return(
            <div key={d.id} style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'1.25rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
              <div style={{display:'flex',alignItems:'center',gap:'1rem',flexWrap:'wrap'}}>
                <div style={{flex:'1 1 200px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                    <span style={{fontFamily:'monospace',fontSize:'12px',color:C.textSecondary}}>{d.num}</span>
                    <span style={{display:'inline-block',padding:'2px 8px',borderRadius:'100px',fontSize:'11px',fontWeight:700,color:st.color,background:st.bg}}>{st.label}</span>
                  </div>
                  <div style={{color:C.textPrimary,fontWeight:700,fontSize:'15px',marginBottom:'2px'}}>{d.objet}</div>
                  <div style={{color:C.textSecondary,fontSize:'13px'}}>{c?.nom||'—'} · Valable {d.validite} jours · {fmtDate(d.created_at)}</div>
                </div>
                <div style={{fontWeight:800,fontSize:'1.3rem',color:C.textPrimary}}>{fmtEur(d.total)}</div>
                <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                  {d.statut==='en_attente'&&<>
                    <Btn onClick={()=>updateStatut(d.id,'accepte')} variant="success" style={{padding:'5px 10px',fontSize:'12px'}}>✓ Accepté</Btn>
                    <Btn onClick={()=>updateStatut(d.id,'refuse')} variant="danger" style={{padding:'5px 10px',fontSize:'12px'}}>✕ Refusé</Btn>
                  </>}
                  <Btn onClick={()=>exportDevisPDF(d,c,cfg.companyName)} variant="outline" style={{padding:'5px 10px',fontSize:'12px'}}>📥 PDF</Btn>
                  <Btn onClick={()=>deleteDevis(d.id)} variant="ghost" style={{padding:'5px 10px',fontSize:'12px',color:C.textMuted}}>🗑</Btn>
                </div>
              </div>
              {(d.lignes||[]).length>0&&(
                <div style={{marginTop:'10px',borderTop:`1px solid ${C.border}`,paddingTop:'8px',display:'flex',gap:'8px',flexWrap:'wrap'}}>
                  {(d.lignes||[]).slice(0,3).map((l,i)=>(
                    <div key={i} style={{fontSize:'12px',color:C.textSecondary,background:C.pageBg,padding:'3px 10px',borderRadius:'6px'}}>
                      {l.desc||'—'} × {l.qte} = <strong style={{color:C.textPrimary}}>{fmtEur((l.qte||0)*(l.pu||0))}</strong>
                    </div>
                  ))}
                  {(d.lignes||[]).length>3&&<div style={{fontSize:'12px',color:C.textMuted,padding:'3px 8px'}}>+{d.lignes.length-3} ligne(s)</div>}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {showCreate&&(
        <Modal title="Nouveau devis" onClose={()=>setShowCreate(false)} width={620}>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'1rem',marginBottom:'1rem'}}>
            <div>
              <label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Client *</label>
              <select value={form.client_id} onChange={e=>setForm({...form,client_id:e.target.value})} style={{width:'100%',padding:'9px 12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'14px',outline:'none'}}>
                <option value="">— Sélectionner —</option>
                {clients.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
              </select>
            </div>
            <div>
              <label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Validité (jours)</label>
              <input type="number" value={form.validite} onChange={e=>setForm({...form,validite:parseInt(e.target.value)||30})} style={{width:'100%',padding:'9px 12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'14px',outline:'none'}}/>
            </div>
          </div>
          <div style={{marginBottom:'1rem'}}>
            <label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Objet *</label>
            <input value={form.objet} onChange={e=>setForm({...form,objet:e.target.value})} placeholder="Ex: Prestation conseil, Réalisation site web..." style={{width:'100%',padding:'9px 12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'14px',outline:'none',boxSizing:'border-box'}}/>
          </div>
          <div style={{marginBottom:'1rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
              <label style={{fontSize:'13px',color:C.textSecondary,fontWeight:500}}>Lignes du devis</label>
              <Btn onClick={addLigne} variant="outline" style={{padding:'4px 10px',fontSize:'12px'}}>+ Ligne</Btn>
            </div>
            <div style={{border:`1px solid ${C.border}`,borderRadius:'8px',overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 60px 80px 80px 32px',padding:'6px 12px',background:'#F8FAFC'}}>
                {['Description','Qté','P.U. (€)','Total',''].map(h=><div key={h} style={{fontSize:'11px',fontWeight:600,color:C.textSecondary,textTransform:'uppercase'}}>{h}</div>)}
              </div>
              {form.lignes.map((l,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 60px 80px 80px 32px',gap:'4px',padding:'6px 8px',borderTop:`1px solid ${C.border}`,alignItems:'center'}}>
                  <input value={l.desc} onChange={e=>updateLigne(i,'desc',e.target.value)} placeholder="Description..." style={{padding:'6px 8px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'6px',color:C.textPrimary,fontSize:'13px',outline:'none'}}/>
                  <input type="number" value={l.qte} onChange={e=>updateLigne(i,'qte',e.target.value)} style={{padding:'6px 8px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'6px',color:C.textPrimary,fontSize:'13px',outline:'none',textAlign:'center'}}/>
                  <input type="number" value={l.pu} onChange={e=>updateLigne(i,'pu',e.target.value)} style={{padding:'6px 8px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'6px',color:C.textPrimary,fontSize:'13px',outline:'none',textAlign:'right'}}/>
                  <div style={{padding:'6px 8px',fontWeight:700,color:C.textPrimary,fontSize:'13px',textAlign:'right'}}>{fmtEur((parseFloat(l.qte)||0)*(parseFloat(l.pu)||0))}</div>
                  <button onClick={()=>removeLigne(i)} style={{background:'none',border:'none',color:C.red,cursor:'pointer',fontSize:'18px'}}>×</button>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'flex-end',padding:'10px 12px',borderTop:`1px solid ${C.border}`,background:C.pageBg}}>
                <div style={{fontWeight:800,fontSize:'15px',color:C.textPrimary}}>Total HT : {fmtEur(totalLignes(form.lignes))}</div>
              </div>
            </div>
          </div>
          <div style={{marginBottom:'1rem'}}>
            <label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Notes (optionnel)</label>
            <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={3} placeholder="Conditions de paiement, remarques..." style={{width:'100%',padding:'9px 12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'13px',outline:'none',boxSizing:'border-box'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:'8px'}}>
            <Btn onClick={()=>setShowCreate(false)} variant="outline">Annuler</Btn>
            <Btn onClick={saveDevis} loading={saving}>Créer le devis</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── FACTURES ────────────────────────────────────────────── */
function Factures({user,clients,factures,setFactures,toast}){
  const [filter,setFilter]=useState('tous');
  const [search,setSearch]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [form,setForm]=useState({num:'',client_id:'',montant:'',emission:'',echeance:''});
  const [errs,setErrs]=useState({});
  const [saving,setSaving]=useState(false);
  const cfg=JSON.parse(localStorage.getItem('ferply-emailjs')||'{}');
  const getC=cid=>clients.find(c=>c.id===cid);
  const filtered=factures.filter(f=>filter==='tous'||f.statut===filter).filter(f=>{if(!search)return true;const q=search.toLowerCase();return f.num.toLowerCase().includes(q)||(getC(f.client_id)?.nom||'').toLowerCase().includes(q);});
  const cnt=s=>factures.filter(f=>f.statut===s).length;
  const validate=()=>{const e={};if(!form.num)e.num='Requis';if(!form.client_id)e.client_id='Requis';if(!form.montant||isNaN(form.montant))e.montant='Invalide';if(!form.echeance)e.echeance='Requis';setErrs(e);return!Object.keys(e).length;};
  const addF=async()=>{
    if(!validate())return;setSaving(true);
    const{data,error}=await sb.from('factures').insert({num:form.num,client_id:form.client_id,montant:parseFloat(form.montant),emission:form.emission||now.toISOString().slice(0,10),echeance:form.echeance,statut:'attente',user_id:user.id}).select().single();
    if(error){toast('✕ Erreur','error');}else{setFactures(p=>[data,...p]);toast('✓ Facture créée');}
    setForm({num:'',client_id:'',montant:'',emission:'',echeance:''});setErrs({});setShowAdd(false);setSaving(false);
  };
  const markPaid=async id=>{await sb.from('factures').update({statut:'payee'}).eq('id',id);setFactures(p=>p.map(f=>f.id===id?{...f,statut:'payee'}:f));toast('✓ Payée');};
  const del=async id=>{if(!window.confirm('Supprimer ?'))return;await sb.from('factures').delete().eq('id',id);setFactures(p=>p.filter(f=>f.id!==id));};

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem',flexWrap:'wrap',gap:'1rem'}}>
        <div><h2 style={{color:C.textPrimary,fontSize:'1.5rem',fontWeight:800,margin:0}}>Factures</h2><p style={{color:C.textSecondary,fontSize:'14px',marginTop:'4px'}}>{factures.length} facture(s) au total</p></div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <Btn onClick={()=>exportRapportPDF(factures,clients,cfg.companyName)} variant="outline">📥 Rapport PDF</Btn>
          <Btn onClick={()=>setShowImport(true)} variant="outline">⬆ Importer</Btn>
          <Btn onClick={()=>setShowAdd(true)}>+ Nouvelle facture</Btn>
        </div>
      </div>
      <div style={{display:'flex',gap:'6px',marginBottom:'1rem',flexWrap:'wrap',alignItems:'center'}}>
        {[['tous','Toutes'],['attente','En attente'],['retard','En retard'],['relancee','Relancées'],['payee','Payées']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{padding:'6px 14px',borderRadius:'100px',fontSize:'13px',fontWeight:500,cursor:'pointer',background:filter===k?C.blue:C.cardBg,color:filter===k?'#fff':C.textSecondary,border:`1px solid ${filter===k?C.blue:C.border}`}}>{l}{k==='tous'?` (${factures.length})`:cnt(k)?` (${cnt(k)})`:null}</button>
        ))}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher..." style={{marginLeft:'auto',padding:'7px 12px',borderRadius:'8px',background:C.cardBg,border:`1px solid ${C.border}`,color:C.textPrimary,fontSize:'13px',outline:'none'}}/>
      </div>
      <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'14px'}}>
            <thead><tr style={{background:'#F8FAFC',borderBottom:`1px solid ${C.border}`}}>{['Numéro','Client','Montant','Échéance','Statut','Actions'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',color:C.textSecondary,fontWeight:600,fontSize:'12px',textTransform:'uppercase',letterSpacing:'.5px'}}>{h}</th>)}</tr></thead>
            <tbody>
              {!filtered.length&&<tr><td colSpan={6} style={{padding:'3rem',textAlign:'center',color:C.textMuted}}>Aucune facture</td></tr>}
              {filtered.map((f,i)=>(
                <tr key={f.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?C.cardBg:'#FAFBFD'}}>
                  <td style={{padding:'11px 14px',fontFamily:'monospace',fontSize:'12px',color:C.textSecondary}}>{f.num}</td>
                  <td style={{padding:'11px 14px',color:C.textPrimary,fontWeight:500,maxWidth:'140px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{getC(f.client_id)?.nom||'—'}</td>
                  <td style={{padding:'11px 14px',color:C.textPrimary,fontWeight:700}}>{fmtEur(f.montant)}</td>
                  <td style={{padding:'11px 14px',fontSize:'13px'}}><span style={{color:f.statut==='retard'?C.red:C.textSecondary}}>{fmtDate(f.echeance)}</span>{f.statut==='retard'&&<span style={{display:'block',fontSize:'11px',color:C.red,fontWeight:600}}>{daysDiff(f.echeance)}j de retard</span>}</td>
                  <td style={{padding:'11px 14px'}}><Badge s={f.statut}/></td>
                  <td style={{padding:'11px 14px'}}>
                    <div style={{display:'flex',gap:'5px'}}>
                      <Btn onClick={()=>exportFacturePDF(f,getC(f.client_id),cfg.companyName)} variant="outline" style={{padding:'4px 9px',fontSize:'11px'}}>📥 PDF</Btn>
                      {f.statut!=='payee'&&<Btn onClick={()=>markPaid(f.id)} variant="success" style={{padding:'4px 9px',fontSize:'11px'}}>✓ Payée</Btn>}
                      <Btn onClick={()=>del(f.id)} variant="danger" style={{padding:'4px 9px',fontSize:'11px'}}>✕</Btn>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {showImport&&<ImportModal type="factures" user={user} clients={clients} setClients={()=>{}} setFactures={setFactures} toast={toast} onClose={()=>setShowImport(false)}/>}
      {showAdd&&(
        <Modal title="Nouvelle facture" onClose={()=>{setShowAdd(false);setErrs({});}}>
          <Input label="Numéro *" placeholder="FAC-2025-001" value={form.num} error={errs.num} onChange={e=>setForm({...form,num:e.target.value})}/>
          <div style={{marginBottom:'1rem'}}>
            <label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Client *</label>
            <select value={form.client_id} onChange={e=>setForm({...form,client_id:e.target.value})} style={{width:'100%',padding:'9px 12px',background:C.inputBg,border:`1.5px solid ${errs.client_id?C.red:C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'14px',outline:'none'}}>
              <option value="">— Sélectionner —</option>
              {clients.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
            </select>
          </div>
          <Input label="Montant (€) *" type="number" value={form.montant} error={errs.montant} onChange={e=>setForm({...form,montant:e.target.value})}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
            <Input label="Date émission" type="date" value={form.emission} onChange={e=>setForm({...form,emission:e.target.value})}/>
            <Input label="Date échéance *" type="date" value={form.echeance} error={errs.echeance} onChange={e=>setForm({...form,echeance:e.target.value})}/>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:'8px',marginTop:'8px'}}>
            <Btn onClick={()=>{setShowAdd(false);setErrs({});}} variant="outline">Annuler</Btn>
            <Btn onClick={addF} loading={saving}>Créer</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── RELANCES ────────────────────────────────────────────── */
function Relances({clients,factures,setFactures,toast}){
  const [sending,setSending]=useState(new Set());
  const [sentLog,setSentLog]=useState([]);
  const getC=cid=>clients.find(c=>c.id===cid);
  const urgentes=factures.filter(f=>['retard','attente','relancee'].includes(f.statut)).sort((a,b)=>new Date(a.echeance)-new Date(b.echeance));

  const sendEmail=async f=>{
    const c=getC(f.client_id);
    if(!c?.email){toast('✕ Aucun email pour ce client','error');return;}
    const cfg=JSON.parse(localStorage.getItem('ferply-emailjs')||'{}');
    if(!cfg.serviceId||!cfg.templateId||!cfg.publicKey){toast('⚙ Configurez EmailJS dans Paramètres','info');return;}
    const tmpl=localStorage.getItem('ferply-template')||'Bonjour {{to_name}}, votre facture {{invoice_number}} de {{amount}} est en attente. Cordialement, {{company_name}}';
    setSending(p=>new Set([...p,f.id]));
    try{
      const res=await fetch('https://api.emailjs.com/api/v1.0/email/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service_id:cfg.serviceId,template_id:cfg.templateId,user_id:cfg.publicKey,template_params:{to_name:c.nom,to_email:c.email,invoice_number:f.num,amount:fmtEur(f.montant),due_date:fmtDate(f.echeance),days_late:daysDiff(f.echeance)>0?`${daysDiff(f.echeance)} jours`:'à échéance',company_name:cfg.companyName||'Ferply',message:tmpl.replace(/{{to_name}}/g,c.nom).replace(/{{invoice_number}}/g,f.num).replace(/{{amount}}/g,fmtEur(f.montant)).replace(/{{due_date}}/g,fmtDate(f.echeance)).replace(/{{days_late}}/g,daysDiff(f.echeance)>0?`${daysDiff(f.echeance)} jours`:'à échéance').replace(/{{company_name}}/g,cfg.companyName||'Ferply')}})});
      if(!res.ok)throw new Error(await res.text());
      await sb.from('factures').update({statut:'relancee'}).eq('id',f.id);
      setFactures(p=>p.map(fc=>fc.id===f.id?{...fc,statut:'relancee'}:fc));
      setSentLog(p=>[{id:uid(),facNum:f.num,client:c.nom,email:c.email,date:new Date().toLocaleString('fr-FR')},...p.slice(0,9)]);
      toast(`✓ Email envoyé à ${c.email}`);
    }catch(e){toast(`✕ Erreur : ${e.message}`,'error');}
    setSending(p=>{const n=new Set(p);n.delete(f.id);return n;});
  };

  const payer=async id=>{await sb.from('factures').update({statut:'payee'}).eq('id',id);setFactures(p=>p.map(f=>f.id===id?{...f,statut:'payee'}:f));toast('✓ Payée');};

  return(
    <div>
      <div style={{marginBottom:'1.5rem'}}><h2 style={{color:C.textPrimary,fontSize:'1.5rem',fontWeight:800,margin:0}}>Relances</h2><p style={{color:C.textSecondary,fontSize:'14px',marginTop:'4px'}}>Factures nécessitant une action.</p></div>
      {!urgentes.length?(<div style={{textAlign:'center',padding:'4rem',background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px'}}><div style={{fontSize:'2.5rem',marginBottom:'1rem'}}>🎉</div><div style={{color:C.textPrimary,fontWeight:700,fontSize:'1.1rem',marginBottom:'8px'}}>Tout est à jour !</div><div style={{color:C.textMuted,fontSize:'14px'}}>Aucune facture en attente.</div></div>):(
        <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
          {urgentes.map(f=>{
            const c=getC(f.client_id);const jours=daysDiff(f.echeance);const enRetard=jours>0;
            return(
              <div key={f.id} style={{background:C.cardBg,border:`1px solid ${enRetard?C.red+'44':C.border}`,borderRadius:'12px',padding:'1.25rem',display:'flex',alignItems:'center',gap:'1.5rem',flexWrap:'wrap',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
                <div style={{flex:'1 1 180px'}}>
                  <div style={{color:C.textPrimary,fontWeight:700,marginBottom:'3px'}}>{c?.nom||<em style={{color:C.textMuted}}>Non assigné</em>}</div>
                  <div style={{color:C.textSecondary,fontSize:'13px'}}>{f.num} · {fmtEur(f.montant)}</div>
                  {c?.email&&<div style={{color:C.blue,fontSize:'12px',marginTop:'3px'}}>✉ {c.email}</div>}
                </div>
                <div style={{textAlign:'center',minWidth:'80px'}}><div style={{fontWeight:800,fontSize:'1.6rem',color:enRetard?C.red:C.amber,lineHeight:1}}>{Math.abs(jours)}j</div><div style={{color:C.textMuted,fontSize:'12px',marginTop:'3px'}}>{enRetard?'de retard':'avant éch.'}</div></div>
                <Badge s={f.statut}/>
                <div style={{display:'flex',gap:'8px'}}>
                  <Btn onClick={()=>sendEmail(f)} loading={sending.has(f.id)} variant="outline" style={{fontSize:'13px'}}>✉ Relancer</Btn>
                  <Btn onClick={()=>payer(f.id)} variant="success" style={{fontSize:'13px'}}>✓ Payée</Btn>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {sentLog.length>0&&(
        <div style={{marginTop:'2rem'}}>
          <h3 style={{color:C.textPrimary,fontSize:'15px',fontWeight:700,marginBottom:'1rem'}}>Historique des envois</h3>
          <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',overflow:'hidden'}}>
            {sentLog.map((l,i)=>(
              <div key={l.id} style={{display:'flex',gap:'1rem',padding:'10px 16px',borderBottom:i<sentLog.length-1?`1px solid ${C.border}`:'none',fontSize:'13px',alignItems:'center',flexWrap:'wrap'}}>
                <span style={{color:C.green,fontWeight:700}}>✓</span>
                <span style={{color:C.textPrimary,fontWeight:500,flex:1}}>{l.client}</span>
                <span style={{color:C.textSecondary,fontFamily:'monospace'}}>{l.facNum}</span>
                <span style={{color:C.blue}}>{l.email}</span>
                <span style={{color:C.textMuted,fontSize:'12px'}}>{l.date}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── CLIENTS ─────────────────────────────────────────────── */
function Clients({user,clients,setClients,factures,setFactures,toast}){
  const [showAdd,setShowAdd]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [form,setForm]=useState({nom:'',email:'',tel:''});
  const [errs,setErrs]=useState({});
  const [saving,setSaving]=useState(false);
  const validate=()=>{const e={};if(!form.nom)e.nom='Requis';if(!form.email||!form.email.includes('@'))e.email='Invalide';setErrs(e);return!Object.keys(e).length;};
  const addC=async()=>{
    if(!validate())return;setSaving(true);
    const{data,error}=await sb.from('clients').insert({...form,user_id:user.id}).select().single();
    if(error){toast('✕ Erreur','error');}else{setClients(p=>[...p,data]);toast('✓ Client ajouté');}
    setForm({nom:'',email:'',tel:''});setErrs({});setShowAdd(false);setSaving(false);
  };
  const delC=async id=>{
    if(factures.some(f=>f.client_id===id)&&!window.confirm('Ce client a des factures. Supprimer ?'))return;
    await sb.from('clients').delete().eq('id',id);setClients(p=>p.filter(c=>c.id!==id));
  };
  const stats=cid=>{const fs=factures.filter(f=>f.client_id===cid);return{total:fs.length,retard:fs.filter(f=>f.statut==='retard').reduce((s,f)=>s+f.montant,0),encaisse:fs.filter(f=>f.statut==='payee').reduce((s,f)=>s+f.montant,0)};};
  const initials=nom=>nom.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <div><h2 style={{color:C.textPrimary,fontSize:'1.5rem',fontWeight:800,margin:0}}>Clients</h2><p style={{color:C.textSecondary,fontSize:'14px',marginTop:'4px'}}>{clients.length} client(s)</p></div>
        <div style={{display:'flex',gap:'8px'}}>
          <Btn onClick={()=>setShowImport(true)} variant="outline">⬆ Importer</Btn>
          <Btn onClick={()=>setShowAdd(true)}>+ Nouveau client</Btn>
        </div>
      </div>
      {!clients.length&&(<div style={{textAlign:'center',padding:'4rem',background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px'}}><div style={{fontSize:'2rem',marginBottom:'1rem'}}>👥</div><div style={{color:C.textPrimary,fontWeight:700,marginBottom:'8px'}}>Aucun client</div><div style={{display:'flex',gap:'8px',justifyContent:'center'}}><Btn onClick={()=>setShowImport(true)} variant="outline">⬆ Importer</Btn><Btn onClick={()=>setShowAdd(true)}>+ Ajouter</Btn></div></div>)}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'1rem'}}>
        {clients.map(c=>{const st=stats(c.id);return(
          <div key={c.id} style={{background:C.cardBg,border:`1px solid ${st.retard>0?C.red+'44':C.border}`,borderRadius:'12px',padding:'1.25rem',position:'relative',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
            <button onClick={()=>delC(c.id)} style={{position:'absolute',top:'12px',right:'12px',background:'none',border:'none',color:C.textMuted,cursor:'pointer',fontSize:'16px'}}>✕</button>
            <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'1rem'}}>
              <div style={{width:44,height:44,borderRadius:'50%',background:C.blue,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:'14px',flexShrink:0}}>{initials(c.nom)}</div>
              <div style={{overflow:'hidden'}}><div style={{color:C.textPrimary,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.nom}</div><div style={{color:C.blue,fontSize:'12px',marginTop:'2px'}}>{c.email}</div></div>
            </div>
            {c.tel&&<div style={{fontSize:'13px',color:C.textSecondary,marginBottom:'12px'}}>📞 {c.tel}</div>}
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:'10px',display:'flex',justifyContent:'space-between',fontSize:'13px'}}>
              <span style={{color:C.textMuted}}>{st.total} facture(s)</span>
              {st.retard>0?<span style={{color:C.red,fontWeight:700}}>{fmtEur(st.retard)} en retard</span>:<span style={{color:C.green,fontWeight:600}}>{fmtEur(st.encaisse)} encaissé</span>}
            </div>
          </div>
        );})}
      </div>
      {showImport&&<ImportModal type="clients" user={user} clients={clients} setClients={setClients} setFactures={setFactures} toast={toast} onClose={()=>setShowImport(false)}/>}
      {showAdd&&(
        <Modal title="Nouveau client" onClose={()=>{setShowAdd(false);setErrs({});}}>
          <Input label="Nom *" placeholder="Bonneau SARL" value={form.nom} error={errs.nom} onChange={e=>setForm({...form,nom:e.target.value})}/>
          <Input label="Email *" type="email" placeholder="compta@client.fr" value={form.email} error={errs.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          <Input label="Téléphone" placeholder="04 00 00 00 00" value={form.tel} onChange={e=>setForm({...form,tel:e.target.value})}/>
          <div style={{display:'flex',justifyContent:'flex-end',gap:'8px',marginTop:'8px'}}>
            <Btn onClick={()=>{setShowAdd(false);setErrs({});}} variant="outline">Annuler</Btn>
            <Btn onClick={addC} loading={saving}>Créer</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── PARAMÈTRES ─────────────────────────────────────────── */
function Parametres({user,toast}){
  const [settings,setSettings]=useState({serviceId:'',templateId:'',publicKey:'',companyName:''});
  const [testing,setTesting]=useState(false);
  const defaultTemplate=`Bonjour {{to_name}},\n\nNous vous contactons au sujet de votre facture n°{{invoice_number}} d'un montant de {{amount}}, dont la date d'échéance était le {{due_date}}.\n\nCe règlement est en attente depuis {{days_late}}.\n\nMerci de procéder au paiement dans les meilleurs délais.\n\nCordialement,\n{{company_name}}`;
  const [template,setTemplate]=useState(defaultTemplate);
  const defaultRules=[
    {id:'r1',actif:true,declencheur:7,type:'avant',objet:'Rappel — Facture {{invoice_number}}',message:'Bonjour {{to_name}},\n\nVotre facture n°{{invoice_number}} de {{amount}} arrive à échéance dans 7 jours.\n\nMerci de prévoir le règlement.\n\nCordialement,\n{{company_name}}'},
    {id:'r2',actif:true,declencheur:1,type:'avant',objet:'Échéance demain — Facture {{invoice_number}}',message:'Bonjour {{to_name}},\n\nVotre facture n°{{invoice_number}} de {{amount}} arrive à échéance demain.\n\nCordialement,\n{{company_name}}'},
    {id:'r3',actif:true,declencheur:3,type:'apres',objet:'Relance — Facture {{invoice_number}} en retard',message:'Bonjour {{to_name}},\n\nVotre facture n°{{invoice_number}} de {{amount}} est en retard de {{days_late}}.\n\nMerci de régulariser rapidement.\n\nCordialement,\n{{company_name}}'},
    {id:'r4',actif:true,declencheur:15,type:'apres',objet:'2ème relance — Facture {{invoice_number}}',message:'Bonjour {{to_name}},\n\nMalgré nos rappels, la facture n°{{invoice_number}} de {{amount}} reste impayée depuis {{days_late}}.\n\nSans réponse sous 48h, nous engagerons une procédure de recouvrement.\n\nCordialement,\n{{company_name}}'},
  ];
  const [rules,setRules]=useState(()=>{const s=localStorage.getItem('ferply-relances-rules');return s?JSON.parse(s):defaultRules;});
  const [editRule,setEditRule]=useState(null);
  const [showEdit,setShowEdit]=useState(false);

  useEffect(()=>{
    const s=localStorage.getItem('ferply-emailjs');if(s)setSettings(JSON.parse(s));
    const t=localStorage.getItem('ferply-template');if(t)setTemplate(t);
  },[]);

  const save=()=>{localStorage.setItem('ferply-emailjs',JSON.stringify(settings));toast('✓ Configuration sauvegardée');};
  const saveTemplate=()=>{localStorage.setItem('ferply-template',template);toast('✓ Template sauvegardé');};
  const resetTemplate=()=>{setTemplate(defaultTemplate);localStorage.setItem('ferply-template',defaultTemplate);toast('✓ Réinitialisé');};
  const saveRules=r=>{setRules(r);localStorage.setItem('ferply-relances-rules',JSON.stringify(r));toast('✓ Règles sauvegardées');};
  const toggleRule=id=>saveRules(rules.map(r=>r.id===id?{...r,actif:!r.actif}:r));
  const deleteRule=id=>{if(window.confirm('Supprimer ?'))saveRules(rules.filter(r=>r.id!==id));};
  const saveEdit=()=>{
    if(editRule.id)saveRules(rules.map(r=>r.id===editRule.id?editRule:r));
    else saveRules([...rules,{...editRule,id:'r'+uid()}]);
    setShowEdit(false);setEditRule(null);
  };

  const testEmail=async()=>{
    if(!settings.serviceId||!settings.templateId||!settings.publicKey){toast('⚠ Remplissez les 3 champs','error');return;}
    setTesting(true);
    try{
      const res=await fetch('https://api.emailjs.com/api/v1.0/email/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service_id:settings.serviceId,template_id:settings.templateId,user_id:settings.publicKey,template_params:{to_name:'Test',to_email:user.email,invoice_number:'FAC-TEST-001',amount:'1 000 €',due_date:'01/01/2025',days_late:'30 jours',company_name:settings.companyName||'Ferply',message:template}})});
      if(res.ok)toast('✓ Email de test envoyé à '+user.email);else toast('✕ Erreur — vérifiez vos clés','error');
    }catch(e){toast('✕ '+e.message,'error');}
    setTesting(false);
  };

  const ejOk=settings.serviceId&&settings.templateId&&settings.publicKey;
  const steps=[
    {num:1,title:'Créer un compte EmailJS',desc:'Gratuit jusqu\'à 200 emails/mois',btn:'Ouvrir EmailJS',url:'https://www.emailjs.com/',color:C.blue},
    {num:2,title:'Créer un service email',desc:'Connectez votre Gmail',btn:'Email Services',url:'https://dashboard.emailjs.com/admin',color:'#7c3aed'},
    {num:3,title:'Créer un template',desc:'Utilisez le message ci-dessous',btn:'Email Templates',url:'https://dashboard.emailjs.com/admin/templates',color:C.green},
    {num:4,title:'Récupérer vos clés',desc:'Service ID, Template ID, Public Key',btn:'API Keys',url:'https://dashboard.emailjs.com/admin/account',color:C.amber},
  ];

  return(
    <div>
      <div style={{marginBottom:'1.5rem'}}><h2 style={{color:C.textPrimary,fontSize:'1.5rem',fontWeight:800,margin:0}}>Paramètres</h2><p style={{color:C.textSecondary,fontSize:'14px',marginTop:'4px'}}>Configuration des relances email</p></div>

      {/* Status */}
      <div style={{background:ejOk?C.greenBg:C.amberBg,border:`1px solid ${ejOk?C.green+'44':C.amber+'44'}`,borderRadius:'12px',padding:'1rem 1.25rem',marginBottom:'1.5rem',display:'flex',alignItems:'center',gap:'12px'}}>
        <span style={{fontSize:'20px'}}>{ejOk?'✅':'⚠️'}</span>
        <div><div style={{color:ejOk?C.green:C.amber,fontWeight:700,fontSize:'14px'}}>{ejOk?'EmailJS configuré — relances actives':'EmailJS non configuré'}</div><div style={{color:C.textSecondary,fontSize:'13px'}}>{ejOk?`Service : ${settings.serviceId}`:'Suivez les étapes ci-dessous'}</div></div>
      </div>

      {/* Guide */}
      <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'1.5rem',marginBottom:'1.5rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
        <h3 style={{color:C.textPrimary,fontWeight:700,fontSize:'15px',marginBottom:'1.25rem'}}>Guide — 4 étapes</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'1rem'}}>
          {steps.map(s=>(
            <div key={s.num} style={{background:C.pageBg,border:`1px solid ${C.border}`,borderRadius:'10px',padding:'1rem',display:'flex',gap:'12px'}}>
              <div style={{width:32,height:32,borderRadius:'50%',background:s.color,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:'14px',flexShrink:0}}>{s.num}</div>
              <div><div style={{color:C.textPrimary,fontWeight:600,fontSize:'14px',marginBottom:'3px'}}>{s.title}</div><div style={{color:C.textSecondary,fontSize:'12px',marginBottom:'8px'}}>{s.desc}</div><a href={s.url} target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',padding:'5px 12px',borderRadius:'6px',background:s.color,color:'#fff',fontSize:'12px',fontWeight:600,textDecoration:'none'}}>{s.btn} ↗</a></div>
            </div>
          ))}
        </div>
      </div>

      {/* Relances auto */}
      <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'1.5rem',marginBottom:'1.5rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}}>
          <h3 style={{color:C.textPrimary,fontWeight:700,fontSize:'15px',margin:0}}>⚡ Relances automatiques</h3>
          <Btn onClick={()=>{setEditRule({id:'',declencheur:7,type:'apres',objet:'',message:'',actif:true});setShowEdit(true);}}>+ Nouvelle règle</Btn>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          {rules.map(r=>(
            <div key={r.id} style={{background:C.pageBg,border:`1px solid ${C.border}`,borderRadius:'10px',padding:'1rem',display:'flex',alignItems:'center',gap:'1rem',flexWrap:'wrap',opacity:r.actif?1:0.6}}>
              <div onClick={()=>toggleRule(r.id)} style={{width:40,height:22,borderRadius:'100px',background:r.actif?C.blue:'#cbd5e1',cursor:'pointer',position:'relative',flexShrink:0,transition:'background .2s'}}>
                <div style={{width:16,height:16,borderRadius:'50%',background:'#fff',position:'absolute',top:3,left:r.actif?21:3,transition:'left .2s'}}/>
              </div>
              <div style={{background:r.type==='avant'?C.amberBg:C.redBg,color:r.type==='avant'?C.amber:C.red,padding:'3px 10px',borderRadius:'8px',fontSize:'12px',fontWeight:700,whiteSpace:'nowrap'}}>J{r.type==='avant'?'-':'+'}{r.declencheur} {r.type==='avant'?'avant':'après'}</div>
              <div style={{flex:1,minWidth:'150px'}}><div style={{color:C.textPrimary,fontWeight:600,fontSize:'13px'}}>{r.objet||'Sans objet'}</div></div>
              <div style={{display:'flex',gap:'5px'}}>
                <Btn onClick={()=>{setEditRule({...r});setShowEdit(true);}} variant="outline" style={{padding:'4px 9px',fontSize:'11px'}}>✏️</Btn>
                <Btn onClick={()=>deleteRule(r.id)} variant="danger" style={{padding:'4px 9px',fontSize:'11px'}}>✕</Btn>
              </div>
            </div>
          ))}
          {!rules.length&&<div style={{textAlign:'center',padding:'2rem',color:C.textMuted}}>Aucune règle</div>}
        </div>
      </div>

      {/* Template */}
      <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'1.5rem',marginBottom:'1.5rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
          <h3 style={{color:C.textPrimary,fontWeight:700,fontSize:'15px',margin:0}}>✏️ Votre message de relance</h3>
          <Btn onClick={resetTemplate} variant="ghost" style={{fontSize:'12px',color:C.textMuted}}>↺ Réinitialiser</Btn>
        </div>
        <textarea value={template} onChange={e=>setTemplate(e.target.value)} rows={8} style={{width:'100%',padding:'14px',background:C.inputBg,border:`1.5px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'14px',outline:'none',fontFamily:'Georgia,serif',lineHeight:1.8,boxSizing:'border-box'}}/>
        <div style={{marginTop:'10px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'8px'}}>
          <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
            {['{{to_name}}','{{invoice_number}}','{{amount}}','{{due_date}}','{{days_late}}','{{company_name}}'].map(v=>(
              <button key={v} onClick={()=>setTemplate(t=>t+v)} style={{padding:'3px 8px',borderRadius:'4px',background:C.blueLight,color:C.blue,border:'none',fontSize:'11px',fontWeight:600,cursor:'pointer'}}>+ {v}</button>
            ))}
          </div>
          <Btn onClick={saveTemplate}>💾 Sauvegarder</Btn>
        </div>
      </div>

      {/* Clés EmailJS */}
      <div style={{background:C.cardBg,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'1.5rem',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
        <h3 style={{color:C.textPrimary,fontWeight:700,fontSize:'15px',marginBottom:'1.25rem'}}>Clés EmailJS</h3>
        <Input label="Nom de votre entreprise" placeholder="Mon Entreprise SAS" value={settings.companyName} onChange={e=>setSettings({...settings,companyName:e.target.value})}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'1rem'}}>
          <Input label="Service ID" placeholder="service_xxxx" value={settings.serviceId} onChange={e=>setSettings({...settings,serviceId:e.target.value})}/>
          <Input label="Template ID" placeholder="template_xxxx" value={settings.templateId} onChange={e=>setSettings({...settings,templateId:e.target.value})}/>
          <Input label="Public Key" placeholder="xxxxxxxxxxxxxxx" value={settings.publicKey} onChange={e=>setSettings({...settings,publicKey:e.target.value})}/>
        </div>
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap'}}>
          <Btn onClick={save}>💾 Sauvegarder</Btn>
          {ejOk&&<Btn onClick={testEmail} loading={testing} variant="outline">✉ Email de test</Btn>}
          {ejOk&&<a href="https://dashboard.emailjs.com/admin" target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',padding:'9px 18px',borderRadius:'8px',background:C.pageBg,border:`1px solid ${C.border}`,color:C.textSecondary,fontSize:'13px',fontWeight:600,textDecoration:'none'}}>Tableau de bord ↗</a>}
        </div>
      </div>

      {showEdit&&editRule&&(
        <Modal title={editRule.id?'Modifier':'Nouvelle règle'} onClose={()=>{setShowEdit(false);setEditRule(null);}} width={540}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'}}>
            <div><label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Type</label><select value={editRule.type} onChange={e=>setEditRule({...editRule,type:e.target.value})} style={{width:'100%',padding:'9px 12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'14px',outline:'none'}}><option value="avant">Avant échéance</option><option value="apres">Après échéance</option></select></div>
            <div><label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Nombre de jours</label><input type="number" min="1" value={editRule.declencheur} onChange={e=>setEditRule({...editRule,declencheur:parseInt(e.target.value)||1})} style={{width:'100%',padding:'9px 12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'14px',outline:'none'}}/></div>
          </div>
          <div style={{marginBottom:'1rem'}}><label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Objet</label><input value={editRule.objet} onChange={e=>setEditRule({...editRule,objet:e.target.value})} placeholder="Objet de l'email" style={{width:'100%',padding:'9px 12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'14px',outline:'none',boxSizing:'border-box'}}/></div>
          <div style={{marginBottom:'1rem'}}><label style={{display:'block',fontSize:'13px',color:C.textSecondary,marginBottom:'5px',fontWeight:500}}>Message</label><textarea value={editRule.message} onChange={e=>setEditRule({...editRule,message:e.target.value})} rows={6} style={{width:'100%',padding:'12px',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.textPrimary,fontSize:'13px',outline:'none',fontFamily:'Georgia,serif',lineHeight:1.7,boxSizing:'border-box'}}/></div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:'8px'}}>
            <Btn onClick={()=>{setShowEdit(false);setEditRule(null);}} variant="outline">Annuler</Btn>
            <Btn onClick={saveEdit}>Sauvegarder</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────────── */
function App(){
  const [session,setSession]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('dashboard');
  const [clients,setClients]=useState([]);
  const [factures,setFactures]=useState([]);
  const [toastData,setToastData]=useState(null);
  const toast=(msg,type='success')=>setToastData({msg,type,key:uid()});

  useEffect(()=>{
    if(window.location.hash.includes('error='))window.history.replaceState(null,'',window.location.pathname);
    sb.auth.getSession().then(({data:{session}})=>{setSession(session);setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setSession(session);if(!session){setClients([]);setFactures([]);}});
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!session)return;
    (async()=>{
      const[{data:c},{data:f}]=await Promise.all([
        sb.from('clients').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false}),
        sb.from('factures').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false}),
      ]);
      if(c)setClients(c);
      if(f){
        const today=new Date().toISOString().slice(0,10);
        const updated=f.map(fac=>{
          if(fac.statut==='attente'&&fac.echeance&&fac.echeance<today){sb.from('factures').update({statut:'retard'}).eq('id',fac.id);return{...fac,statut:'retard'};}
          return fac;
        });
        setFactures(updated);
        const cfg=JSON.parse(localStorage.getItem('ferply-emailjs')||'{}');
        const rules=JSON.parse(localStorage.getItem('ferply-relances-rules')||'[]');
        if(cfg.serviceId&&cfg.templateId&&cfg.publicKey&&rules.length){
          const todayDate=new Date();
          updated.filter(fac=>fac.statut!=='payee').forEach(async fac=>{
            if(!fac.echeance)return;
            const client=c?.find(cl=>cl.id===fac.client_id);
            if(!client?.email)return;
            const diffJours=Math.round((todayDate-new Date(fac.echeance))/864e5);
            rules.filter(r=>r.actif).forEach(async rule=>{
              const jours=rule.type==='avant'?-rule.declencheur:rule.declencheur;
              if(diffJours===jours){
                const lastKey=`ferply-sent-${fac.id}-${rule.id}-${today}`;
                if(localStorage.getItem(lastKey))return;
                try{
                  await fetch('https://api.emailjs.com/api/v1.0/email/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service_id:cfg.serviceId,template_id:cfg.templateId,user_id:cfg.publicKey,template_params:{to_name:client.nom,to_email:client.email,invoice_number:fac.num,amount:fmtEur(fac.montant),due_date:fmtDate(fac.echeance),days_late:Math.abs(diffJours)+' jours',company_name:cfg.companyName||'Ferply',message:(rule.message||'').replace(/{{to_name}}/g,client.nom).replace(/{{invoice_number}}/g,fac.num).replace(/{{amount}}/g,fmtEur(fac.montant)).replace(/{{due_date}}/g,fmtDate(fac.echeance)).replace(/{{days_late}}/g,Math.abs(diffJours)+' jours').replace(/{{company_name}}/g,cfg.companyName||'Ferply')}})});
                  localStorage.setItem(lastKey,'1');
                }catch(e){console.error('Auto-relance:',e);}
              }
            });
          });
        }
      }
    })();
  },[session]);

  const logout=async()=>{await sb.auth.signOut();setSession(null);setView('dashboard');};

  if(loading)return(<div style={{minHeight:'100vh',background:`linear-gradient(135deg,${C.blueDark} 0%,#2d5a9e 100%)`,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{textAlign:'center'}}><Logo size={38} light={true}/><div style={{color:'#94a3b8',fontSize:'14px',marginTop:'12px'}}>Chargement...</div></div></div>);
  if(!session)return <AuthPage onAuth={()=>sb.auth.getSession().then(({data:{session}})=>setSession(session))}/>;

  const retardCount=factures.filter(f=>f.statut==='retard').length;
  const nav=[
    {id:'dashboard',icon:'⊞',label:'Dashboard'},
    {id:'devis',    icon:'📋',label:'Devis'},
    {id:'factures', icon:'📄',label:'Factures'},
    {id:'relances', icon:'⚡',label:'Relances',badge:retardCount||null},
    {id:'clients',  icon:'👥',label:'Clients'},
    {id:'parametres',icon:'⚙️',label:'Paramètres'},
  ];

  return(
    <div style={{display:'flex',height:'100vh',background:C.pageBg,color:C.textPrimary,overflow:'hidden',fontSize:'14px'}}>
      <aside style={{width:'220px',flexShrink:0,background:C.sidebarBg,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'1.5rem',borderBottom:`1px solid ${C.sidebarBorder}`}}>
          <Logo size={26} light={true}/>
          <div style={{fontSize:'11px',color:'#64748b',marginTop:'8px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{session.user.email}</div>
        </div>
        <nav style={{padding:'0.75rem 0',flex:1}}>
          {nav.map(n=>(
            <button key={n.id} onClick={()=>setView(n.id)} style={{display:'flex',alignItems:'center',gap:'10px',padding:'11px 1.25rem',width:'100%',background:view===n.id?'rgba(255,255,255,0.1)':'transparent',borderLeft:`3px solid ${view===n.id?'#93c5fd':'transparent'}`,border:'none',borderRight:'none',color:view===n.id?'#fff':'#94a3b8',fontSize:'14px',fontWeight:view===n.id?600:400,cursor:'pointer',textAlign:'left',transition:'all .15s'}}>
              <span style={{fontSize:'16px',flexShrink:0}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {n.badge&&<span style={{background:'rgba(220,38,38,0.3)',color:'#fca5a5',fontSize:'11px',fontWeight:700,padding:'2px 7px',borderRadius:'100px'}}>{n.badge}</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:'1rem 1.25rem',borderTop:`1px solid ${C.sidebarBorder}`}}>
          <div style={{fontSize:'12px',marginBottom:'10px'}}>
            <div style={{color:'#86efac',marginBottom:'3px'}}>🔒 Connexion sécurisée</div>
            <div style={{color:'#64748b'}}>{clients.length} clients · {factures.length} factures</div>
          </div>
          <Btn onClick={logout} variant="sidebarBtn" full style={{fontSize:'12px',padding:'7px'}}>Se déconnecter</Btn>
        </div>
      </aside>
      <main style={{flex:1,overflow:'auto',padding:'2rem',background:C.pageBg}}>
        {view==='dashboard'  &&<Dashboard  clients={clients} factures={factures} setView={setView}/>}
        {view==='devis'      &&<Devis      user={session.user} clients={clients} toast={toast}/>}
        {view==='factures'   &&<Factures   user={session.user} clients={clients} factures={factures} setFactures={setFactures} toast={toast}/>}
        {view==='relances'   &&<Relances   clients={clients} factures={factures} setFactures={setFactures} toast={toast}/>}
        {view==='clients'    &&<Clients    user={session.user} clients={clients} setClients={setClients} factures={factures} setFactures={setFactures} toast={toast}/>}
        {view==='parametres' &&<Parametres user={session.user} toast={toast}/>}
      </main>
      {toastData&&<Toast key={toastData.key} msg={toastData.msg} type={toastData.type} onDone={()=>setToastData(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
