<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ferply — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#161b22}
  ::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6)}
  textarea{resize:vertical}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── SUPABASE ──────────────────────────────────────────────
const SUPA_URL='https://lhwmhrswmilmkifgwmnk.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxod21ocnN3bWlsbWtpZmd3bW5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODAxNjQsImV4cCI6MjA5NDI1NjE2NH0.fK2nlsddJqkn-zvii5bnz0mQiPggdWoX7SXvu6UI7po';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// ── CONSTANTS ─────────────────────────────────────────────
const fmtEur=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const fmtDate=d=>d?new Date(d).toLocaleDateString('fr-FR'):'—';
const daysDiff=d=>Math.round((Date.now()-new Date(d))/864e5);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const now=new Date();

const T={bg:'#0d1117',bg2:'#161b22',bg3:'#21262d',bd:'#30363d',text:'#e6edf3',muted:'#8b949e',teal:'#1d9e75',white:'#fff',r8:'8px',r12:'12px'};
const STATUTS={
  attente:{label:'En attente',color:'#d29922',bg:'rgba(210,153,34,0.12)'},
  retard:{label:'En retard',color:'#f85149',bg:'rgba(248,81,73,0.12)'},
  relancee:{label:'Relancée',color:'#79c0ff',bg:'rgba(121,192,255,0.12)'},
  payee:{label:'Payée',color:'#3fb950',bg:'rgba(63,185,80,0.12)'},
};

// ── UI PRIMITIVES ─────────────────────────────────────────
function Badge({s}){const st=STATUTS[s]||STATUTS.attente;return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:'100px',fontSize:'12px',fontWeight:600,color:st.color,background:st.bg}}>{st.label}</span>;}

function Btn({onClick,children,variant='primary',full,disabled,loading,style:s={}}){
  const base={padding:'9px 18px',borderRadius:T.r8,fontSize:'13px',fontWeight:600,cursor:disabled||loading?'default':'pointer',width:full?'100%':'auto',opacity:disabled||loading?0.55:1,transition:'opacity .15s',...s};
  const v={primary:{background:T.teal,color:'#fff',border:'none'},outline:{background:'transparent',color:T.text,border:`1px solid ${T.bd}`},danger:{background:'rgba(248,81,73,0.1)',color:'#f85149',border:'1px solid rgba(248,81,73,0.2)'},success:{background:'rgba(63,185,80,0.1)',color:'#3fb950',border:'1px solid rgba(63,185,80,0.2)'},ghost:{background:'transparent',color:T.muted,border:'none'},info:{background:'rgba(121,192,255,0.1)',color:'#79c0ff',border:'1px solid rgba(121,192,255,0.2)'},red:{background:'rgba(248,81,73,0.15)',color:'#f85149',border:'1px solid rgba(248,81,73,0.3)'}};
  return <button onClick={disabled||loading?undefined:onClick} style={{...base,...(v[variant]||v.primary)}}>{loading?'⏳...' : children}</button>;
}

function Input({label,error,...p}){return(
  <div style={{marginBottom:'1rem'}}>
    {label&&<label style={{display:'block',fontSize:'13px',color:T.muted,marginBottom:'5px'}}>{label}</label>}
    <input {...p} style={{width:'100%',padding:'9px 12px',background:T.bg3,border:`1px solid ${error?'#f85149':T.bd}`,borderRadius:T.r8,color:T.text,fontSize:'14px',outline:'none',boxSizing:'border-box',...p.style}}/>
    {error&&<div style={{fontSize:'12px',color:'#f85149',marginTop:'4px'}}>{error}</div>}
  </div>
);}

function Modal({title,onClose,children,width=480}){return(
  <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.78)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:'1rem'}}>
    <div style={{background:T.bg2,border:`1px solid ${T.bd}`,borderRadius:'16px',padding:'2rem',width:'100%',maxWidth:width,maxHeight:'90vh',overflowY:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <h3 style={{color:T.white,fontSize:'1.1rem',fontWeight:700,margin:0}}>{title}</h3>
        <Btn onClick={onClose} variant="ghost" style={{fontSize:'22px',lineHeight:1,padding:'0 6px'}}>×</Btn>
      </div>
      {children}
    </div>
  </div>
);}

function Toast({msg,type='success',onDone}){
  useEffect(()=>{const t=setTimeout(onDone,4000);return()=>clearTimeout(t);},[]);
  const c={success:{bg:'#141e18',bd:'rgba(63,185,80,0.3)',color:'#3fb950'},error:{bg:'#1e1414',bd:'rgba(248,81,73,0.3)',color:'#f85149'},info:{bg:'#141620',bd:'rgba(121,192,255,0.3)',color:'#79c0ff'}};
  const st=c[type]||c.success;
  return <div style={{position:'fixed',bottom:'2rem',right:'2rem',background:st.bg,border:`1px solid ${st.bd}`,borderRadius:T.r12,padding:'12px 20px',color:st.color,fontSize:'14px',fontWeight:500,zIndex:2000,maxWidth:'380px',lineHeight:1.5}}>{msg}</div>;
}

// ── AUTH PAGE ─────────────────────────────────────────────
function AuthPage({onAuth}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pwd,setPwd]=useState('');
  const [company,setCompany]=useState('');
  const [code,setCode]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [success,setSuccess]=useState('');

  // Code d'invitation — tu peux le changer
  const INVITE_CODE='FERPLY2024';

  const handleLogin=async()=>{
    if(!email||!pwd){setError('Email et mot de passe requis');return;}
    setLoading(true);setError('');
    const{error:e}=await sb.auth.signInWithPassword({email,password:pwd});
    if(e){setError('Email ou mot de passe incorrect');setLoading(false);return;}
    onAuth();
  };

  const handleSignup=async()=>{
    if(!email||!pwd||!company){setError('Tous les champs sont requis');return;}
    if(code!==INVITE_CODE){setError('Code d\'invitation invalide. Contactez ferply pour obtenir un accès.');return;}
    if(pwd.length<8){setError('Le mot de passe doit contenir au moins 8 caractères');return;}
    setLoading(true);setError('');
    const{data,error:e}=await sb.auth.signUp({email,password:pwd,options:{data:{company_name:company}}});
    if(e){setError(e.message);setLoading(false);return;}
    if(data.user){
      await sb.from('profiles').insert({id:data.user.id,email,company_name:company,invited:true});
    }
    setSuccess('Compte créé ! Vérifiez votre email pour confirmer votre inscription.');
    setLoading(false);
  };

  return(
    <div style={{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
      <div style={{width:'100%',maxWidth:'420px'}}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:'2.5rem'}}>
          <div style={{fontSize:'38px',fontWeight:900,color:T.white,letterSpacing:'-2px',marginBottom:'8px'}}>
            ferply<span style={{color:T.teal}}>.</span>
          </div>
          <p style={{color:T.muted,fontSize:'15px'}}>La trésorerie, enfin sous contrôle.</p>
        </div>

        {/* Card */}
        <div style={{background:T.bg2,border:`1px solid ${T.bd}`,borderRadius:'16px',padding:'2rem'}}>
          {/* Tabs */}
          <div style={{display:'flex',gap:'4px',background:T.bg3,borderRadius:T.r8,padding:'4px',marginBottom:'1.5rem'}}>
            {[['login','Connexion'],['signup','Créer un compte']].map(([m,l])=>(
              <button key={m} onClick={()=>{setMode(m);setError('');setSuccess('');}} style={{flex:1,padding:'8px',borderRadius:'6px',border:'none',fontSize:'13px',fontWeight:500,cursor:'pointer',background:mode===m?T.bg2:'transparent',color:mode===m?T.white:T.muted,transition:'all .15s'}}>{l}</button>
            ))}
          </div>

          {error&&<div style={{background:'rgba(248,81,73,0.08)',border:'1px solid rgba(248,81,73,0.2)',borderRadius:T.r8,padding:'10px 14px',color:'#f85149',fontSize:'13px',marginBottom:'1rem'}}>{error}</div>}
          {success&&<div style={{background:'rgba(63,185,80,0.08)',border:'1px solid rgba(63,185,80,0.2)',borderRadius:T.r8,padding:'10px 14px',color:'#3fb950',fontSize:'13px',marginBottom:'1rem'}}>{success}</div>}

          {mode==='login'?(
            <>
              <Input label="Email" type="email" placeholder="vous@entreprise.fr" value={email} onChange={e=>setEmail(e.target.value)}/>
              <Input label="Mot de passe" type="password" placeholder="••••••••" value={pwd} onChange={e=>setPwd(e.target.value)}/>
              <Btn onClick={handleLogin} loading={loading} full style={{marginTop:'8px'}}>Se connecter</Btn>
              <p style={{fontSize:'12px',color:T.muted,textAlign:'center',marginTop:'1rem'}}>
                Pas encore de compte ? <span onClick={()=>setMode('signup')} style={{color:T.teal,cursor:'pointer'}}>Demandez un accès</span>
              </p>
            </>
          ):(
            <>
              <Input label="Raison sociale *" placeholder="Mon Entreprise SAS" value={company} onChange={e=>setCompany(e.target.value)}/>
              <Input label="Email professionnel *" type="email" placeholder="vous@entreprise.fr" value={email} onChange={e=>setEmail(e.target.value)}/>
              <Input label="Mot de passe *" type="password" placeholder="8 caractères minimum" value={pwd} onChange={e=>setPwd(e.target.value)}/>
              <div style={{marginBottom:'1rem'}}>
                <label style={{display:'block',fontSize:'13px',color:T.muted,marginBottom:'5px'}}>Code d'invitation *</label>
                <input type="text" placeholder="Entrez votre code d'accès" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} style={{width:'100%',padding:'9px 12px',background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:T.r8,color:T.teal,fontSize:'14px',outline:'none',fontFamily:'monospace',letterSpacing:'2px',boxSizing:'border-box'}}/>
                <div style={{fontSize:'11px',color:T.muted,marginTop:'4px'}}>Contactez-nous sur ferply.io pour obtenir votre code d'accès</div>
              </div>
              <Btn onClick={handleSignup} loading={loading} full style={{marginTop:'8px'}}>Créer mon compte</Btn>
            </>
          )}
        </div>

        {/* Footer */}
        <p style={{textAlign:'center',fontSize:'12px',color:T.muted,marginTop:'1.5rem'}}>
          🔒 Données hébergées en Europe · Conformité RGPD · Chiffrement SSL
        </p>
      </div>
    </div>
  );
}

// ── STAT CARD ─────────────────────────────────────────────
function StatCard({label,value,sub,color}){return(
  <div style={{background:T.bg2,border:`1px solid ${T.bd}`,borderRadius:T.r12,padding:'1.25rem'}}>
    <div style={{fontSize:'12px',color:T.muted,marginBottom:'6px',textTransform:'uppercase',letterSpacing:'.5px'}}>{label}</div>
    <div style={{fontSize:'1.8rem',fontWeight:800,color:color||T.white,letterSpacing:'-1px',lineHeight:1}}>{value}</div>
    {sub&&<div style={{fontSize:'12px',color:T.muted,marginTop:'6px'}}>{sub}</div>}
  </div>
);}

// ── DASHBOARD ─────────────────────────────────────────────
function Dashboard({clients,factures,setView}){
  const actives=factures.filter(f=>f.statut!=='payee');
  const retardF=factures.filter(f=>f.statut==='retard');
  const getC=cid=>clients.find(c=>c.id===cid);
  const recentes=[...factures].sort((a,b)=>new Date(b.emission)-new Date(a.emission)).slice(0,6);
  return(
    <div>
      <div style={{marginBottom:'1.5rem'}}>
        <h2 style={{color:T.white,fontSize:'1.5rem',fontWeight:800,margin:0,letterSpacing:'-0.5px'}}>Tableau de bord</h2>
        <p style={{color:T.muted,fontSize:'14px',marginTop:'4px'}}>{now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'1rem',marginBottom:'2rem'}}>
        <StatCard label="Total à encaisser" value={fmtEur(actives.reduce((s,f)=>s+f.montant,0))} sub={`${actives.length} factures actives`}/>
        <StatCard label="En retard" value={fmtEur(retardF.reduce((s,f)=>s+f.montant,0))} color="#f85149" sub={`${retardF.length} facture(s)`}/>
        <StatCard label="Déjà encaissé" value={fmtEur(factures.filter(f=>f.statut==='payee').reduce((s,f)=>s+f.montant,0))} color="#3fb950"/>
        <StatCard label="Clients actifs" value={clients.length}/>
      </div>
      {retardF.length>0&&(
        <div style={{background:'rgba(248,81,73,0.07)',border:'1px solid rgba(248,81,73,0.2)',borderRadius:T.r12,padding:'1rem 1.25rem',marginBottom:'1.5rem',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'1rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <span>⚠️</span>
            <div>
              <div style={{color:'#f85149',fontWeight:600,fontSize:'14px'}}>{retardF.length} facture(s) en retard</div>
              <div style={{color:T.muted,fontSize:'13px'}}>{fmtEur(retardF.reduce((s,f)=>s+f.montant,0))} à recouvrer</div>
            </div>
          </div>
          <Btn onClick={()=>setView('relances')} variant="danger" style={{fontSize:'13px'}}>Gérer les relances →</Btn>
        </div>
      )}
      <div style={{background:T.bg2,border:`1px solid ${T.bd}`,borderRadius:T.r12,overflow:'hidden'}}>
        <div style={{padding:'1rem 1.25rem',borderBottom:`1px solid ${T.bd}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{color:T.white,fontWeight:600,fontSize:'15px',margin:0}}>Factures récentes</h3>
          <Btn onClick={()=>setView('factures')} variant="ghost" style={{fontSize:'13px',color:T.teal}}>Voir tout →</Btn>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'14px'}}>
            <thead><tr style={{borderBottom:`1px solid ${T.bd}`}}>{['Numéro','Client','Montant','Échéance','Statut'].map(h=><th key={h} style={{padding:'9px 16px',textAlign:'left',color:T.muted,fontWeight:500,fontSize:'12px'}}>{h}</th>)}</tr></thead>
            <tbody>
              {!recentes.length&&<tr><td colSpan={5} style={{padding:'2rem',textAlign:'center',color:T.muted}}>Aucune facture pour l'instant</td></tr>}
              {recentes.map(f=>(
                <tr key={f.id} style={{borderBottom:`1px solid rgba(48,54,61,0.4)`}}>
                  <td style={{padding:'11px 16px',color:T.text,fontFamily:'monospace',fontSize:'12px'}}>{f.num}</td>
                  <td style={{padding:'11px 16px',color:T.text}}>{getC(f.client_id)?.nom||'—'}</td>
                  <td style={{padding:'11px 16px',color:T.white,fontWeight:700}}>{fmtEur(f.montant)}</td>
                  <td style={{padding:'11px 16px',color:f.statut==='retard'?'#f85149':T.muted,fontSize:'13px'}}>{fmtDate(f.echeance)}</td>
                  <td style={{padding:'11px 16px'}}><Badge s={f.statut}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── FACTURES ──────────────────────────────────────────────
function Factures({user,clients,factures,setFactures,setView,toast}){
  const [filter,setFilter]=useState('tous');
  const [search,setSearch]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({num:'',client_id:'',montant:'',emission:'',echeance:'',statut:'attente'});
  const [errs,setErrs]=useState({});
  const [saving,setSaving]=useState(false);
  const getC=cid=>clients.find(c=>c.id===cid);
  const filtered=factures.filter(f=>filter==='tous'||f.statut===filter).filter(f=>{if(!search)return true;const q=search.toLowerCase();return f.num.toLowerCase().includes(q)||(getC(f.client_id)?.nom||'').toLowerCase().includes(q);});
  const cnt=s=>factures.filter(f=>f.statut===s).length;

  const validate=()=>{const e={};if(!form.num)e.num='Requis';if(!form.client_id)e.client_id='Requis';if(!form.montant||isNaN(form.montant))e.montant='Invalide';if(!form.echeance)e.echeance='Requis';setErrs(e);return!Object.keys(e).length;};

  const addF=async()=>{
    if(!validate())return;
    setSaving(true);
    const newF={num:form.num,client_id:form.client_id,montant:parseFloat(form.montant),emission:form.emission||now.toISOString().slice(0,10),echeance:form.echeance,statut:'attente',user_id:user.id};
    const{data,error}=await sb.from('factures').insert(newF).select().single();
    if(error){toast('✕ Erreur lors de la création','error');}
    else{setFactures(p=>[data,...p]);toast('✓ Facture créée');}
    setForm({num:'',client_id:'',montant:'',emission:'',echeance:'',statut:'attente'});
    setErrs({});setShowAdd(false);setSaving(false);
  };

  const markPaid=async id=>{
    await sb.from('factures').update({statut:'payee'}).eq('id',id);
    setFactures(p=>p.map(f=>f.id===id?{...f,statut:'payee'}:f));
    toast('✓ Facture marquée payée');
  };

  const del=async id=>{
    if(!window.confirm('Supprimer cette facture ?'))return;
    await sb.from('factures').delete().eq('id',id);
    setFactures(p=>p.filter(f=>f.id!==id));
  };

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem',flexWrap:'wrap',gap:'1rem'}}>
        <h2 style={{color:T.white,fontSize:'1.5rem',fontWeight:800,margin:0,letterSpacing:'-0.5px'}}>Factures</h2>
        <Btn onClick={()=>setShowAdd(true)}>+ Nouvelle facture</Btn>
      </div>
      <div style={{display:'flex',gap:'6px',marginBottom:'1rem',flexWrap:'wrap',alignItems:'center'}}>
        {[['tous','Toutes'],['attente','En attente'],['retard','En retard'],['relancee','Relancées'],['payee','Payées']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{padding:'6px 14px',borderRadius:'100px',fontSize:'13px',fontWeight:500,cursor:'pointer',background:filter===k?T.teal:'transparent',color:filter===k?'#fff':T.muted,border:`1px solid ${filter===k?T.teal:T.bd}`}}>
            {l}{k==='tous'?` (${factures.length})`:cnt(k)?` (${cnt(k)})`:null}
          </button>
        ))}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher..." style={{marginLeft:'auto',padding:'6px 12px',borderRadius:T.r8,background:T.bg3,border:`1px solid ${T.bd}`,color:T.text,fontSize:'13px',outline:'none'}}/>
      </div>
      <div style={{background:T.bg2,border:`1px solid ${T.bd}`,borderRadius:T.r12,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'14px'}}>
            <thead><tr style={{borderBottom:`1px solid ${T.bd}`}}>{['Numéro','Client','Montant','Échéance','Statut','Actions'].map(h=><th key={h} style={{padding:'9px 14px',textAlign:'left',color:T.muted,fontWeight:500,fontSize:'12px'}}>{h}</th>)}</tr></thead>
            <tbody>
              {!filtered.length&&<tr><td colSpan={6} style={{padding:'3rem',textAlign:'center',color:T.muted}}>Aucune facture</td></tr>}
              {filtered.map(f=>(
                <tr key={f.id} style={{borderBottom:`1px solid rgba(48,54,61,0.4)`}}>
                  <td style={{padding:'10px 14px',fontFamily:'monospace',fontSize:'12px',color:T.text}}>{f.num}</td>
                  <td style={{padding:'10px 14px',color:T.text,maxWidth:'140px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{getC(f.client_id)?.nom||<em style={{color:T.muted}}>—</em>}</td>
                  <td style={{padding:'10px 14px',color:T.white,fontWeight:700}}>{fmtEur(f.montant)}</td>
                  <td style={{padding:'10px 14px',fontSize:'13px'}}>
                    <span style={{color:f.statut==='retard'?'#f85149':T.muted}}>{fmtDate(f.echeance)}</span>
                    {f.statut==='retard'&&<span style={{display:'block',fontSize:'11px',color:'#f85149'}}>{daysDiff(f.echeance)}j de retard</span>}
                  </td>
                  <td style={{padding:'10px 14px'}}><Badge s={f.statut}/></td>
                  <td style={{padding:'10px 14px'}}>
                    <div style={{display:'flex',gap:'5px'}}>
                      {f.statut!=='payee'&&<Btn onClick={()=>markPaid(f.id)} variant="success" style={{padding:'4px 9px',fontSize:'11px'}}>✓</Btn>}
                      <Btn onClick={()=>del(f.id)} variant="danger" style={{padding:'4px 9px',fontSize:'11px'}}>✕</Btn>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {showAdd&&(
        <Modal title="Nouvelle facture" onClose={()=>{setShowAdd(false);setErrs({});}}>
          <Input label="Numéro *" placeholder="FAC-2024-001" value={form.num} error={errs.num} onChange={e=>setForm({...form,num:e.target.value})}/>
          <div style={{marginBottom:'1rem'}}>
            <label style={{display:'block',fontSize:'13px',color:T.muted,marginBottom:'5px'}}>Client *</label>
            <select value={form.client_id} onChange={e=>setForm({...form,client_id:e.target.value})} style={{width:'100%',padding:'9px 12px',background:T.bg3,border:`1px solid ${errs.client_id?'#f85149':T.bd}`,borderRadius:T.r8,color:T.text,fontSize:'14px',outline:'none'}}>
              <option value="">— Sélectionner —</option>
              {clients.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
            </select>
          </div>
          <Input label="Montant (€) *" type="number" value={form.montant} error={errs.montant} onChange={e=>setForm({...form,montant:e.target.value})}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
            <Input label="Date émission" type="date" value={form.emission} onChange={e=>setForm({...form,emission:e.target.value})}/>
            <Input label="Date échéance *" type="date" value={form.echeance} error={errs.echeance} onChange={e=>setForm({...form,echeance:e.target.value})}/>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:'8px',marginTop:'8px'}}>
            <Btn onClick={()=>{setShowAdd(false);setErrs({});}} variant="outline">Annuler</Btn>
            <Btn onClick={addF} loading={saving}>Créer</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── RELANCES ──────────────────────────────────────────────
function Relances({clients,factures,setFactures,toast}){
  const getC=cid=>clients.find(c=>c.id===cid);
  const urgentes=factures.filter(f=>['retard','attente','relancee'].includes(f.statut)).sort((a,b)=>new Date(a.echeance)-new Date(b.echeance));

  const relancer=async id=>{
    await sb.from('factures').update({statut:'relancee'}).eq('id',id);
    setFactures(p=>p.map(f=>f.id===id?{...f,statut:'relancee'}:f));
    toast('✉ Relance enregistrée');
  };

  const payer=async id=>{
    await sb.from('factures').update({statut:'payee'}).eq('id',id);
    setFactures(p=>p.map(f=>f.id===id?{...f,statut:'payee'}:f));
    toast('✓ Payée');
  };

  return(
    <div>
      <div style={{marginBottom:'1.5rem'}}>
        <h2 style={{color:T.white,fontSize:'1.5rem',fontWeight:800,margin:0,letterSpacing:'-0.5px'}}>Relances</h2>
        <p style={{color:T.muted,fontSize:'14px',marginTop:'4px'}}>Factures nécessitant une action.</p>
      </div>
      {!urgentes.length
        ?<div style={{textAlign:'center',padding:'4rem',background:T.bg2,border:`1px solid ${T.bd}`,borderRadius:T.r12}}>
          <div style={{fontSize:'2.5rem',marginBottom:'1rem'}}>🎉</div>
          <div style={{color:T.white,fontWeight:600,marginBottom:'8px'}}>Tout est à jour !</div>
          <div style={{color:T.muted,fontSize:'14px'}}>Aucune facture en attente.</div>
        </div>
        :<div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
          {urgentes.map(f=>{
            const c=getC(f.client_id);const jours=daysDiff(f.echeance);const enRetard=jours>0;
            return(
              <div key={f.id} style={{background:T.bg2,border:`1px solid ${enRetard?'rgba(248,81,73,0.25)':T.bd}`,borderRadius:T.r12,padding:'1.25rem',display:'flex',alignItems:'center',gap:'1.5rem',flexWrap:'wrap'}}>
                <div style={{flex:'1 1 180px'}}>
                  <div style={{color:T.white,fontWeight:600,marginBottom:'3px'}}>{c?.nom||<em style={{color:T.muted}}>Non assigné</em>}</div>
                  <div style={{color:T.muted,fontSize:'13px'}}>{f.num} · {fmtEur(f.montant)}</div>
                  {c?.email&&<div style={{color:T.teal,fontSize:'12px',marginTop:'3px'}}>✉ {c.email}</div>}
                </div>
                <div style={{textAlign:'center',minWidth:'80px'}}>
                  <div style={{fontWeight:800,fontSize:'1.6rem',color:enRetard?'#f85149':'#d29922',lineHeight:1}}>{Math.abs(jours)}j</div>
                  <div style={{color:T.muted,fontSize:'12px',marginTop:'3px'}}>{enRetard?'de retard':'avant éch.'}</div>
                </div>
                <Badge s={f.statut}/>
                <div style={{display:'flex',gap:'8px'}}>
                  <Btn onClick={()=>relancer(f.id)} variant="outline" style={{fontSize:'13px'}}>✉ Relancer</Btn>
                  <Btn onClick={()=>payer(f.id)} variant="success" style={{fontSize:'13px'}}>✓ Payée</Btn>
                </div>
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}

// ── CLIENTS ───────────────────────────────────────────────
function Clients({user,clients,setClients,factures,toast}){
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({nom:'',email:'',tel:''});
  const [errs,setErrs]=useState({});
  const [saving,setSaving]=useState(false);

  const validate=()=>{const e={};if(!form.nom)e.nom='Requis';if(!form.email||!form.email.includes('@'))e.email='Invalide';setErrs(e);return!Object.keys(e).length;};

  const addC=async()=>{
    if(!validate())return;
    setSaving(true);
    const{data,error}=await sb.from('clients').insert({...form,user_id:user.id}).select().single();
    if(error){toast('✕ Erreur lors de la création','error');}
    else{setClients(p=>[...p,data]);toast('✓ Client ajouté');}
    setForm({nom:'',email:'',tel:''});setErrs({});setShowAdd(false);setSaving(false);
  };

  const delC=async id=>{
    const h=factures.some(f=>f.client_id===id);
    if(h&&!window.confirm('Ce client a des factures. Supprimer quand même ?'))return;
    await sb.from('clients').delete().eq('id',id);
    setClients(p=>p.filter(c=>c.id!==id));
  };

  const stats=cid=>{const fs=factures.filter(f=>f.client_id===cid);return{total:fs.length,retard:fs.filter(f=>f.statut==='retard').reduce((s,f)=>s+f.montant,0),encaisse:fs.filter(f=>f.statut==='payee').reduce((s,f)=>s+f.montant,0)};};

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <h2 style={{color:T.white,fontSize:'1.5rem',fontWeight:800,margin:0,letterSpacing:'-0.5px'}}>Clients ({clients.length})</h2>
        <Btn onClick={()=>setShowAdd(true)}>+ Nouveau client</Btn>
      </div>
      {!clients.length&&(
        <div style={{textAlign:'center',padding:'4rem',background:T.bg2,border:`1px solid ${T.bd}`,borderRadius:T.r12}}>
          <div style={{fontSize:'2rem',marginBottom:'1rem'}}>👥</div>
          <div style={{color:T.white,fontWeight:600,marginBottom:'8px'}}>Aucun client pour l'instant</div>
          <div style={{color:T.muted,fontSize:'14px',marginBottom:'1.5rem'}}>Ajoutez vos premiers clients pour commencer à gérer vos factures.</div>
          <Btn onClick={()=>setShowAdd(true)}>+ Ajouter un client</Btn>
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:'1rem'}}>
        {clients.map(c=>{const st=stats(c.id);return(
          <div key={c.id} style={{background:T.bg2,border:`1px solid ${st.retard>0?'rgba(248,81,73,0.25)':T.bd}`,borderRadius:T.r12,padding:'1.25rem',position:'relative'}}>
            <button onClick={()=>delC(c.id)} style={{position:'absolute',top:'12px',right:'12px',background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:'16px'}}>✕</button>
            <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'1rem'}}>
              <div style={{width:42,height:42,borderRadius:'50%',background:'rgba(29,158,117,0.15)',border:'1px solid rgba(29,158,117,0.25)',display:'flex',alignItems:'center',justifyContent:'center',color:T.teal,fontWeight:700,fontSize:'14px',flexShrink:0}}>{c.nom.slice(0,2).toUpperCase()}</div>
              <div style={{overflow:'hidden'}}>
                <div style={{color:T.white,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.nom}</div>
                <div style={{color:T.teal,fontSize:'12px',marginTop:'2px'}}>{c.email}</div>
              </div>
            </div>
            {c.tel&&<div style={{fontSize:'13px',color:T.muted,marginBottom:'12px'}}>📞 {c.tel}</div>}
            <div style={{borderTop:`1px solid ${T.bd}`,paddingTop:'10px',display:'flex',justifyContent:'space-between',fontSize:'13px'}}>
              <span style={{color:T.muted}}>{st.total} facture(s)</span>
              {st.retard>0?<span style={{color:'#f85149',fontWeight:600}}>{fmtEur(st.retard)} en retard</span>:<span style={{color:'#3fb950'}}>{fmtEur(st.encaisse)} encaissé</span>}
            </div>
          </div>
        );})}
      </div>
      {showAdd&&(
        <Modal title="Nouveau client" onClose={()=>{setShowAdd(false);setErrs({});}}>
          <Input label="Nom *" placeholder="Bonneau SARL" value={form.nom} error={errs.nom} onChange={e=>setForm({...form,nom:e.target.value})}/>
          <Input label="Email *" type="email" placeholder="compta@client.fr" value={form.email} error={errs.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          <Input label="Téléphone" placeholder="04 00 00 00 00" value={form.tel} onChange={e=>setForm({...form,tel:e.target.value})}/>
          <div style={{display:'flex',justifyContent:'flex-end',gap:'8px',marginTop:'8px'}}>
            <Btn onClick={()=>{setShowAdd(false);setErrs({});}} variant="outline">Annuler</Btn>
            <Btn onClick={addC} loading={saving}>Créer</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('dashboard');
  const [clients,setClients]=useState([]);
  const [factures,setFactures]=useState([]);
  const [toastData,setToastData]=useState(null);
  const toast=(msg,type='success')=>setToastData({msg,type,key:uid()});

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setSession(session);
      if(!session){setClients([]);setFactures([]);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!session)return;
    const loadData=async()=>{
      const[{data:c},{data:f}]=await Promise.all([
        sb.from('clients').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false}),
        sb.from('factures').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false}),
      ]);
      if(c)setClients(c);
      if(f)setFactures(f);
    };
    loadData();
  },[session]);

  const logout=async()=>{
    await sb.auth.signOut();
    setSession(null);
    setView('dashboard');
  };

  if(loading)return(
    <div style={{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'32px',fontWeight:900,color:T.white,letterSpacing:'-1px',marginBottom:'1rem'}}>ferply<span style={{color:T.teal}}>.</span></div>
        <div style={{color:T.muted,fontSize:'14px'}}>Chargement...</div>
      </div>
    </div>
  );

  if(!session)return <AuthPage onAuth={()=>sb.auth.getSession().then(({data:{session}})=>setSession(session))}/>;

  const retardCount=factures.filter(f=>f.statut==='retard').length;
  const nav=[
    {id:'dashboard',icon:'⊞',label:'Dashboard'},
    {id:'factures', icon:'📄',label:'Factures'},
    {id:'relances', icon:'⚡',label:'Relances',badge:retardCount||null,bc:'#f85149'},
    {id:'clients',  icon:'👥',label:'Clients'},
  ];

  return(
    <div style={{display:'flex',height:'100vh',background:T.bg,color:T.text,overflow:'hidden',fontSize:'14px'}}>
      <style>{`*{box-sizing:border-box} input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6)}`}</style>
      <aside style={{width:'210px',flexShrink:0,background:T.bg2,borderRight:`1px solid ${T.bd}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'1.25rem',borderBottom:`1px solid ${T.bd}`}}>
          <div style={{fontSize:'22px',fontWeight:900,color:T.white,letterSpacing:'-1px'}}>ferply<span style={{color:T.teal}}>.</span></div>
          <div style={{fontSize:'11px',color:T.muted,marginTop:'2px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{session.user.email}</div>
        </div>
        <nav style={{padding:'1rem 0',flex:1}}>
          {nav.map(n=>(
            <button key={n.id} onClick={()=>setView(n.id)} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 1.25rem',width:'100%',background:view===n.id?'rgba(29,158,117,0.1)':'transparent',borderLeft:`3px solid ${view===n.id?T.teal:'transparent'}`,border:'none',borderRight:'none',color:view===n.id?T.teal:T.muted,fontSize:'14px',fontWeight:view===n.id?600:400,cursor:'pointer',textAlign:'left'}}>
              <span style={{fontSize:'16px',flexShrink:0}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {n.badge&&<span style={{background:`${n.bc}22`,color:n.bc,fontSize:'11px',fontWeight:700,padding:'2px 7px',borderRadius:'100px'}}>{n.badge}</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:'1rem 1.25rem',borderTop:`1px solid ${T.bd}`}}>
          <div style={{fontSize:'12px',color:T.muted,marginBottom:'10px'}}>
            <div style={{color:'#3fb950',marginBottom:'3px'}}>🔒 Connexion sécurisée</div>
            <div>{clients.length} clients · {factures.length} factures</div>
          </div>
          <Btn onClick={logout} variant="outline" full style={{fontSize:'12px',padding:'7px'}}>Se déconnecter</Btn>
        </div>
      </aside>
      <main style={{flex:1,overflow:'auto',padding:'2rem',background:T.bg}}>
        {view==='dashboard'&&<Dashboard clients={clients} factures={factures} setView={setView}/>}
        {view==='factures' &&<Factures  user={session.user} clients={clients} factures={factures} setFactures={setFactures} setView={setView} toast={toast}/>}
        {view==='relances' &&<Relances  clients={clients} factures={factures} setFactures={setFactures} toast={toast}/>}
        {view==='clients'  &&<Clients   user={session.user} clients={clients} setClients={setClients} factures={factures} toast={toast}/>}
      </main>
      {toastData&&<Toast key={toastData.key} msg={toastData.msg} type={toastData.type} onDone={()=>setToastData(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
